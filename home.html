<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zoomies</title>
  <meta name="description"
    content="Zoomies — a first-person speedrun through a 3D replica of my room. Play as a cat, collect every coin." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Same stylesheet (and design tokens) the in-game UI uses, so the
       splash card and tab bar paint identically across home / about /
       leaderboard. -->
  <link rel="stylesheet" href="./src/styles/main.css" />
  <!-- Phosphor icon CSS is deferred via preload+onload so it never
       render-blocks the splash card on first paint. The card doubles
       as the loading indicator and MUST appear with the first frame —
       a third-party CDN stylesheet sitting in the critical path used
       to delay that paint by hundreds of ms (sometimes seconds on a
       cold cache). The <noscript> fallback keeps icons working when
       JS is disabled, in which case render-blocking is acceptable. -->
  <link rel="preload" as="style" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
    onload="this.onload=null;this.rel='stylesheet'" />
  <link rel="preload" as="style" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  </noscript>
  <style>
    /* main.css locks html/body to overflow:hidden;height:100% for the 3D
       game; override here so the home menu can scroll if a small viewport
       ever needs it. The splash card itself is fixed-positioned, so this
       is just a safety net. */
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--text);
      font-weight: var(--weight-regular);
      line-height: 1.55;
      text-rendering: optimizeLegibility;
      /* Same dark fallback the about page uses so the page never flashes
         white before the iframe scene comes in. */
      background: radial-gradient(1200px 700px at 18% -12%, #244868 0%, transparent 58%),
        radial-gradient(900px 560px at 110% 10%, #1f3e56 0%, transparent 65%),
        linear-gradient(180deg, #122637, #07121d);
      position: relative;
      z-index: 0;
    }

    /* Live game scene rendered behind the menu — same iframe pattern as
       about / leaderboard, so all three pages share one persistent
       three.js scene. The src points directly at /play?bg=1 (not /)
       since this page IS the menu over /play's bg; an iframe inside
       another iframe would defeat the purpose. */
    #bgFrame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.05);
      opacity: 0;
      /* No transition: snap from 0 → 1 the moment the scene is ready.
         A fade here makes glass cards on top look weakly blurred while
         the iframe is mid-transition, since backdrop-filter is
         sampling a half-transparent iframe over a flat body color. */
    }

    #bgFrame.ready {
      opacity: 1;
    }

    /* When the iframe is "promoted" out of bg mode into play (the
       big Play CTA), input needs to flow into it. The scrim and the
       (now-hidden) tabs/main go pointer-events:none so clicks land
       on the iframe canvas underneath. We also lift the iframe ABOVE
       #bgScrim so the scrim's backdrop-filter no longer paints over
       the picker (which lives inside the iframe). The bedroom stays
       blurred during the transition because the iframe-side picker
       runs its own constant-strength blur layer on body::before. */
    body.is-playing #bgFrame {
      pointer-events: auto;
      z-index: 2;
    }

    @media (prefers-reduced-motion: reduce) {
      #bgFrame {
        display: none;
      }
    }

    /* Same scrim definition as about.html / leaderboard.html so all
       three pages render the live three.js scene through the same
       piece of glass. */
    #bgScrim {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(8, 10, 16, 0.55) 0%, rgba(8, 10, 16, 0) 55%),
        radial-gradient(120% 80% at 50% 100%, rgba(8, 10, 16, 0.6) 0%, rgba(8, 10, 16, 0) 55%);
      backdrop-filter: blur(2px) saturate(1.1);
      -webkit-backdrop-filter: blur(2px) saturate(1.1);
    }

    /* ── Boot-as-loading-indicator ────────────────────────────────
       The splash card doubles as the loading indicator on first
       paint. It paints OPAQUE on frame 1 (no entrance animation, no
       waiting for the iframe scene), shows a spinner where Play
       lives, and then morphs to the liquid-glass treatment in
       place — same DOM element — once the iframe scene reports
       ready. The morph is a single CSS transition on the card's
       background-color, so there's no swap, no double-render, and
       no perceptible seam between the two states.

       Why override main.css's pageContentIn entrance: that keyframe
       animates the card from opacity:0 + translateY(12px) +
       blur(8px) to ready over 0.7s. On home that animation IS the
       delay we're trying to eliminate — the boot→glass morph
       replaces it. (SPA-nav into home loses the entrance too, but
       <main>'s own is-entering choreography in main.css covers that
       case with a softer fade.) */
    main.page>.title-splash-card {
      display: block;
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
      transition:
        background-color 0.65s cubic-bezier(0.32, 0.72, 0, 1),
        border-color 0.5s ease-out;
    }

    /* Boot state — opaque dark fill replaces var(--glass). The
       backdrop-filter and specular gradient stay set on the card
       (they're invisible against an opaque bg-color), which means
       removing .is-booting only animates background-color: no
       composite-layer churn, no flash. The dark fill is tuned to
       roughly match the body gradient under the card so the morph
       reads as "the dark surface becomes glass" rather than "a
       different rectangle replaces the dark one". */
    body.is-booting main.page>.title-splash-card {
      background-color: #0e2034;
      border-color: rgba(255, 255, 255, 0.06);
    }

    /* Loading content (spinner + "Loading…") is shown only during
       boot; the Play row takes over once the scene is ready. Both
       use the existing .title-splash-play-content--loading /
       --ready classes from main.css (which also defines the
       spinner's keyframes), but main.css gates them behind
       #titleSplash[data-state="…"] sibling selectors that don't
       apply here (home has no #titleSplash). Re-gate them on
       body.is-booting instead. */
    main.page>.title-splash-card .title-splash-play-content {
      display: none;
    }

    body.is-booting main.page>.title-splash-card .title-splash-play-content--loading {
      display: inline-flex;
    }

    body:not(.is-booting) main.page>.title-splash-card .title-splash-play-content--ready {
      display: inline-flex;
    }

    /* During boot, the Play button can't actually start a run — the
       iframe scene isn't up yet — so kill its hit-targeting and
       show a progress cursor. pointer-events also blocks Tab+Enter
       activation since a disabled <a> still receives keyboard focus. */
    body.is-booting .title-splash-play {
      cursor: progress;
      pointer-events: none;
    }

    /* The splash treatment lives in main.css under #titleSplash and
       .title-splash-card. We center the card via flexbox here so the
       card itself doesn't need a `transform: translate(-50%, -50%)`
       compound-transform centering trick — that conflicts with the
       shared pageContentIn keyframe used on every page. */
    main.page {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Work-in-progress notice — full-bleed footer strip attached to
       the bottom of the splash card. Negative margins cancel the
       card's 44px / 36px padding so the strip touches the card edges,
       and matching bottom border-radius lets it share the card's
       rounded corners cleanly. The card itself doesn't set
       overflow:hidden (its top sheen ::before would clip), so we
       round the strip's own bottom corners to match. */
    .wip-notice {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      /* Cancel card padding (44px 36px 36px) so the strip is full-bleed. */
      margin: 12px -36px -36px;
      padding: 12px 18px;
      font-size: 12px;
      font-weight: 700;
      color: #ffd9b8;
      background: rgba(255, 217, 184, 0.06);
      border-top: 1px solid rgba(255, 217, 184, 0.22);
      border-radius: 0 0 32px 32px;
    }

    .wip-notice i {
      font-size: 13px;
      color: #ffb877;
    }

    .wip-notice__detail {
      font-weight: 500;
      color: rgba(255, 232, 210, 0.78);
    }

    /* Mobile mirror — main.css drops card padding to 32px 22px 26px
       and corner radius to 26px below 540px; match both. */
    @media (max-width: 540px) {
      .wip-notice {
        margin: 12px -22px -26px;
        border-radius: 0 0 26px 26px;
      }
    }

    /* Inline link in the splash tagline (e.g. the word "leaderboard").
       Uses the cyan accent the about-page hero links use so internal
       nav links read the same across surfaces. */
    .title-splash-tagline a {
      color: #9fe3ff;
      text-decoration: underline;
      text-decoration-color: rgba(159, 227, 255, 0.45);
      text-underline-offset: 3px;
      transition: color 160ms ease, text-decoration-color 160ms ease;
    }

    .title-splash-tagline a:hover,
    .title-splash-tagline a:focus-visible {
      color: #fff;
      text-decoration-color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>

<body class="is-booting">
  <!-- Persistent live-scene iframe — kept mounted across SPA swaps to
       /about and /leaderboard so the three.js scene never reboots when
       the user changes tabs. The router only replaces <main> + the
       page-local <style data-view> blocks; this iframe is left alone.
       The `allow` attribute is required for pointer-lock to work
       once the iframe is "promoted" out of bg mode into play. -->
  <iframe id="bgFrame" src="/play?bg=1" title="" aria-hidden="true" tabindex="-1"
    allow="pointer-lock; fullscreen; autoplay; gamepad" referrerpolicy="same-origin"></iframe>

  <nav class="site-tabs" aria-label="Primary">
    <a class="site-tab" href="/" data-tab="home">
      <i class="site-tab__icon site-tab__icon--regular ph ph-house"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-house"></i><span>Home</span>
    </a>
    <a class="site-tab" href="/leaderboard" data-tab="leaderboard">
      <i class="site-tab__icon site-tab__icon--regular ph ph-trophy"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-trophy"></i><span>Leaderboard</span>
    </a>
    <a class="site-tab" href="/about" data-tab="about">
      <i class="site-tab__icon site-tab__icon--regular ph ph-info"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-info"></i><span>About</span>
    </a>
  </nav>

  <!-- Page scrim — same div pattern as about / leaderboard so all
       three pages share the EXACT same scrim treatment over the live
       three.js scene. Previously home was reusing #titleSplash for
       this, which had its own padding / overflow / animation rules
       and lived inside <main>, producing a subtly darker, slightly
       different look than the other pages. -->
  <div id="bgScrim" aria-hidden="true">
    <div class="bg-grid"></div>
  </div>

  <main class="page">
    <!-- Splash card — same markup as /play used to have, minus the
         button-state spans (no loading state on home) and minus the
         secondary nav (replaced by the top-level .site-tabs). -->
    <div class="title-splash-card" role="dialog" aria-modal="true" aria-label="Zoomies — title screen">
      <h1 class="title-splash-title">
        <span class="title-splash-speed-line" aria-hidden="true"></span>
        <span class="title-splash-title-main">Zoomies</span>
      </h1>
      <p class="title-splash-tagline">
        A first-person speedrun through a 3D replica of my room. Pick a cat (or a Totodile), find secret coins, try to
        top the <a href="/leaderboard" data-spa-link>leaderboard</a>.
      </p>
      <div class="title-splash-cta">
        <!-- Plain anchor — the SPA router intercepts site-tab clicks
             only; this Play button is a real navigation to /play with
             a brief fade for continuity. We use an <a> (not a <button>)
             so middle-click / cmd-click open in a new tab as expected. -->
        <a class="title-splash-play glass-btn glass-btn--primary" href="/play" data-play-cta>
          <!-- Boot/loading row — visible while body.is-booting (see
               inline CSS above). Reuses the .title-splash-play-spinner
               keyframes from main.css so the spinner here matches the
               one on /play's title screen exactly. -->
          <span class="title-splash-play-content title-splash-play-content--loading">
            <span class="title-splash-play-spinner" aria-hidden="true"></span>
            <span>Loading…</span>
          </span>
          <span class="title-splash-play-content title-splash-play-content--ready">
            <span>Play</span>
          </span>
        </a>
      </div>
      <div class="wip-notice" role="status">
        <i class="ph-fill ph-warning"></i>
        <span>Work in progress</span>
        <span class="wip-notice__detail">— expect some bugs, mostly works</span>
      </div>
    </div>
  </main>

  <script>
    // Reveal the bg iframe once the live scene's first frame paints.
    // The iframe (vite-index.html in is-bg mode) posts a
    // `bg-scene-ready` message after its first composited frame; we
    // gate the fade-in on that message so the glass cards on this
    // page never end up briefly blurring an empty canvas (an empty
    // canvas reveals the iframe body's flat color, and blurring a
    // flat color looks identical to no blur at all).
    (function () {
      const bg = document.getElementById('bgFrame');
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Tabs start hidden (CSS) and slide down once the scene is up
      // AND the splash card has had time to settle. The chrome lands
      // last so the eye reads the room first.
      let _tabsRevealed = false;
      function revealTabs() {
        if (_tabsRevealed) return;
        _tabsRevealed = true;
        document.body.classList.add('tabs-revealed');
      }

      // End the boot/loading state. Removing .is-booting from <body>
      // triggers the CSS transition on .title-splash-card's
      // background-color (opaque → glass), and swaps the Play
      // button's spinner row for its "Play" row. Same DOM element
      // throughout — the morph is a pure CSS state change. */
      let _bootEnded = false;
      function endBoot() {
        if (_bootEnded) return;
        _bootEnded = true;
        document.body.classList.remove('is-booting');
      }

      function reveal() {
        if (bg) bg.classList.add('ready');
        // Mark the iframe as ready so a Play click that landed before
        // boot finished can now flush its queued enter-play message.
        bg && bg.setAttribute('data-scene-ready', '1');
        if (typeof window.__flushPendingPlay === 'function') window.__flushPendingPlay();
        // End the boot state on the same frame the iframe is revealed
        // — the iframe is sitting at opacity:0 → 1 (snap, no transition)
        // BEHIND the still-opaque card, so the user can't see it pop.
        // The card then morphs to glass over 0.65s and the now-visible
        // live scene refracts through it. Tabs come in last.
        endBoot();
        setTimeout(revealTabs, 520);
      }
      if (!bg || reduce) {
        // No live scene to gate on — end boot immediately so the
        // user isn't stuck on the loading row, then reveal tabs after
        // a beat. (With reduce-motion we skip the iframe entirely;
        // the card stays opaque-styled but functional.)
        endBoot();
        setTimeout(revealTabs, reduce ? 0 : 1100);
        return;
      }
      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        if (e.data && e.data.type === 'bg-scene-ready') reveal();
      });
      // Fallback: if the message never arrives (older cached iframe,
      // postMessage blocked, etc.) reveal anyway after 4s.
      setTimeout(reveal, 4000);
    })();
  </script>

  <script>
    // Shared SPA router — same code as about.html / leaderboard.html.
    // Intercepts top-tab clicks and swaps just the <main> contents +
    // page-local <style data-view> blocks, so the persistent #bgFrame
    // stays mounted and the three.js scene never reboots when you
    // change tabs.
    //
    // The big "Play" button is NOT a site-tab, so it falls through to
    // a normal navigation (with fade) — that's the deliberate "you're
    // entering the game now" transition.
    (function () {
      const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

      function viewFor(path) {
        path = path.replace(/\/+$/, '') || '/';
        if (path === '/' || path === '/home' || path === '/home.html') return 'home';
        if (path === '/about' || path === '/about.html') return 'about';
        if (path === '/leaderboard' || path === '/leaderboard.html' || path.startsWith('/leaderboard')) return 'leaderboard';
        if (path === '/play' || path === '/vite-index.html' || path === '/index.html') return 'play';
        return null;
      }

      function setActiveTab(view) {
        document.querySelectorAll('.site-tabs .site-tab').forEach(t => {
          const id = t.getAttribute('data-tab');
          const active = id === view;
          t.classList.toggle('is-active', active);
          if (active) t.setAttribute('aria-current', 'page');
          else t.removeAttribute('aria-current');
        });
        updatePill();
      }

      // Active-tab pill — a single absolutely-positioned div behind
      // the tabs that slides + resizes to match the active one. Same
      // pattern Stripe uses on its blog category nav. We animate
      // transform (GPU) and width together so the rounded ends don't
      // distort the way scaleX would.
      function buildPill() {
        const nav = document.querySelector('.site-tabs');
        if (!nav || nav.querySelector('.site-tabs-pill')) return;
        const pill = document.createElement('div');
        pill.className = 'site-tabs-pill';
        pill.setAttribute('aria-hidden', 'true');
        // Insert before the tabs so it's the first child; CSS z-index
        // (not DOM order) governs stacking, but this also helps any
        // future hover-only tab styling read more naturally.
        nav.insertBefore(pill, nav.firstChild);
        nav.classList.add('has-pill');
      }

      function updatePill() {
        const nav = document.querySelector('.site-tabs');
        const pill = nav && nav.querySelector('.site-tabs-pill');
        const active = nav && nav.querySelector('.site-tab.is-active');
        if (!nav || !pill || !active) return;
        const navRect = nav.getBoundingClientRect();
        const tabRect = active.getBoundingClientRect();
        const left = tabRect.left - navRect.left;
        pill.style.transform = `translateX(${left}px)`;
        pill.style.width = `${tabRect.width}px`;
      }

      // Tag the initial view's <main> and any page-local <style> blocks
      // so we can cleanly remove this view's styles on swap to another
      // view (otherwise rules would bleed across pages).
      (function tagInitial() {
        const v = viewFor(location.pathname);
        if (!v || v === 'play') return;
        document.querySelectorAll('head > style').forEach(s => {
          if (!s.dataset.view) s.dataset.view = v;
        });
        const main = document.querySelector('main.page');
        if (main && !main.dataset.view) main.dataset.view = v;
      })();
      buildPill();
      setActiveTab(viewFor(location.pathname));
      // Enable the pill's clip-path transition on the next frame so
      // the initial position doesn't slide in from the left on load.
      requestAnimationFrame(() => {
        const nav = document.querySelector('.site-tabs');
        if (nav) nav.classList.add('pill-ready');
      });
      window.addEventListener('resize', updatePill);
      // Webfonts can resize the tab labels after first paint; re-measure
      // when they're ready so the pill snaps to the final width.
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(updatePill).catch(() => { });
      }

      function fullNav(href, opts) {
        if (reduced) { location.href = href; return; }
        document.body.classList.add('page-fade', 'is-leaving');
        // Play CTA gets a longer hold so the tabs visibly lift away
        // before the next document loads — the entire transition reads
        // as one motion (chrome clears, char-select bounces in over
        // the same room scene). Other full-navs keep the snappy 160ms.
        const wait = (opts && opts.slow) ? 360 : 160;
        setTimeout(() => { location.href = href; }, wait);
      }

      async function swap(href) {
        const targetView = viewFor(href);
        if (!targetView || targetView === 'play') { fullNav(href); return; }

        const oldMain = document.querySelector('main.page');

        // Start the fetch immediately so it overlaps with the exit
        // animation (saves a noticeable amount of perceived latency
        // on slower connections).
        const fetchPromise = fetch(href, { credentials: 'same-origin' }).then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        });

        // Exit: animate the OLD <main> out via .is-leaving on the
        // element itself. Each direction owning its own class is what
        // makes the entrance work cleanly — see CSS comment.
        if (oldMain && !reduced) oldMain.classList.add('is-leaving');
        const exitWait = reduced ? 0 : 200;

        let html;
        try {
          html = await fetchPromise;
        } catch (e) {
          location.href = href;
          return;
        }
        if (exitWait) await new Promise(r => setTimeout(r, exitWait));

        const doc = new DOMParser().parseFromString(html, 'text/html');
        document.title = doc.title || document.title;

        document.querySelectorAll('head > style[data-view]').forEach(s => s.remove());
        doc.querySelectorAll('head > style').forEach(s => {
          const clone = s.cloneNode(true);
          clone.dataset.view = targetView;
          document.head.appendChild(clone);
        });

        const newMain = doc.querySelector('main.page');
        const currentOldMain = document.querySelector('main.page');
        if (newMain && currentOldMain) {
          newMain.dataset.view = targetView;
          // Mark this main as SPA-inserted so CSS can suppress any
          // inner keyframe animations (see the data-spa rule in
          // main.css) that would otherwise blink on top of our outer
          // page transition.
          newMain.dataset.spa = '1';
          if (!reduced) newMain.classList.add('is-entering');
          currentOldMain.replaceWith(newMain);
          // Force a layout read so the entering state is committed to
          // the style cache before we remove the class. Without this
          // the browser folds the from/to into one paint and the
          // entrance is skipped (the stuttery "blink in" we're fixing).
          if (!reduced) {
            void newMain.offsetWidth;
            requestAnimationFrame(() => newMain.classList.remove('is-entering'));
          }
        }

        history.pushState({ view: targetView }, '', href);
        setActiveTab(targetView);

        if (targetView === 'leaderboard' && typeof window.__initLeaderboard === 'function') {
          window.__initLeaderboard();
        }

        window.scrollTo(0, 0);
      }

      document.addEventListener('click', (e) => {
        const a = e.target.closest && e.target.closest('a[href]');
        if (!a) return;
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
        if (a.target && a.target !== '_self') return;

        let url;
        try { url = new URL(a.href, location.href); }
        catch { return; }
        if (url.origin !== location.origin) return;

        // Top tabs: SPA-swap when staying within iframe-backed views.
        if (a.classList.contains('site-tab')) {
          const targetView = viewFor(url.pathname);
          const currentView = viewFor(location.pathname);
          if (a.classList.contains('is-active')) { e.preventDefault(); return; }
          if (targetView && targetView !== 'play' && currentView && currentView !== 'play') {
            e.preventDefault();
            swap(url.pathname + url.search + url.hash);
          } else {
            e.preventDefault();
            fullNav(a.href);
          }
          return;
        }

        // Inline content links opting into the SPA router (e.g. the
        // "leaderboard" word in the splash tagline). Same iframe-
        // preserving swap as tab clicks, just without the tab styling.
        if (a.hasAttribute('data-spa-link')) {
          const targetView = viewFor(url.pathname);
          const currentView = viewFor(location.pathname);
          if (targetView && targetView !== 'play' && currentView && currentView !== 'play') {
            e.preventDefault();
            swap(url.pathname + url.search + url.hash);
            return;
          }
        }

        // The big Play CTA: instead of navigating to /play (which
        // would tear down the bg iframe and rebuild the entire three.js
        // scene from scratch — the source of the old stutter), we
        // PROMOTE the bg iframe in place. The home chrome animates out
        // via body.is-leaving, and the iframe drops its is-bg class
        // and opens char-select. URL is updated via pushState so the
        // back button still works. The iframe's three.js scene flows
        // seamlessly from "menu backdrop" into "active game" with no
        // rebuild and no scene seam.
        if (a.hasAttribute('data-play-cta')) {
          e.preventDefault();
          promoteToPlay(a.href);
        }
      });

      // ── Iframe promotion ────────────────────────────────────────
      const bgFrame = document.getElementById('bgFrame');

      // Send enter-play once the iframe's three.js scene has signaled
      // bg-scene-ready. If the user clicks Play before that fires
      // (very rare on warm cache, possible on cold load), queue the
      // send and let the boot-script flush it via __flushPendingPlay.
      let _pendingPlay = false;
      function _sendEnterPlay() {
        if (!bgFrame || !bgFrame.contentWindow) return;
        try { bgFrame.contentWindow.postMessage({ type: 'enter-play' }, location.origin); } catch (e) { }
        try { bgFrame.contentWindow.focus(); } catch (e) { }
      }
      window.__flushPendingPlay = function () {
        if (!_pendingPlay) return;
        _pendingPlay = false;
        _sendEnterPlay();
      };
      function _enterPlayWhenReady() {
        if (bgFrame && bgFrame.getAttribute('data-scene-ready') === '1') {
          _sendEnterPlay();
        } else {
          _pendingPlay = true;
        }
      }

      function promoteToPlay(href) {
        // Capture the path the user is returning to. Stored on a
        // shared global so whichever page's IIFE happens to be the
        // active one (only the FIRST loaded page's script runs —
        // SPA swap doesn't re-execute) returns to the right URL.
        // Without this, going leaderboard → (SPA swap to about) →
        // play → close would push leaderboard's hardcoded path back.
        window.__playReturnPath = location.pathname + location.search + location.hash;
        // Reduced motion: skip the choreography. We still avoid the
        // top-level navigation (and its scene rebuild) — just snap.
        if (reduced) {
          history.pushState({ view: 'play' }, '', href || '/play');
          document.body.classList.add('is-playing');
          _enterPlayWhenReady();
          setActiveTab('play');
          return;
        }
        // Animate home chrome out.
        document.body.classList.add('page-fade', 'is-leaving');
        // Update URL immediately so history is consistent if the user
        // hits back mid-transition.
        history.pushState({ view: 'play' }, '', href || '/play');
        setActiveTab('play');
        // Choreographed three-beat promotion:
        //   1. 0–700ms   chrome exits (ease-in: holds, then accelerates)
        //   2. 700–850ms just the bedroom — a clean visual breath
        //   3. 850ms+    picker fades in over the live scene
        // Earlier we overlapped the exit and entry at 120ms which read
        // as one rushed motion; sequencing them gives each beat room
        // to land and makes the live three.js scene visibly the
        // "shared backdrop" between the two screens.
        setTimeout(() => {
          document.body.classList.add('is-playing');
          _enterPlayWhenReady();
        }, 850);
      }

      function demoteFromPlay({ updateHistory = true } = {}) {
        // Called when the iframe posts { type: 'play-exited' } after
        // it has reset its camera and re-applied is-bg under its black
        // overlay. Our job: bring the chrome back in and route to
        // wherever the user came FROM (which may not be /home if they
        // SPA-swapped to /about or /leaderboard before clicking Play).
        const ret = window.__playReturnPath || '/';
        const retView = viewFor(ret) || 'home';
        if (updateHistory) {
          history.pushState({ view: retView }, '', ret);
        }
        setActiveTab(retView);
        document.body.classList.remove('is-playing');
        document.body.classList.remove('is-leaving');
        // Keep page-fade for the duration of the transition; remove
        // after the chrome has re-entered so it doesn't block future
        // animations.
        setTimeout(() => document.body.classList.remove('page-fade'), 700);
      }

      // Track whether the most recent demote was triggered by the
      // back button (popstate) — in that case the URL is already
      // correct and demoteFromPlay shouldn't pushState again.
      let _demoteFromPopstate = false;

      // Listen for the iframe's exit handshake.
      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        const data = e.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'play-exited') {
          demoteFromPlay({ updateHistory: !_demoteFromPopstate });
          _demoteFromPopstate = false;
        }
      });

      window.addEventListener('popstate', (e) => {
        const v = viewFor(location.pathname);
        // Cross-promotion-boundary cases: between /play and the menu
        // pages we drive promotion via postMessage rather than reload.
        const isPlaying = document.body.classList.contains('is-playing');
        if (v === 'play' && !isPlaying) {
          // Forward to /play while currently on a menu — promote.
          // No pushState here either: popstate already moved the URL.
          document.body.classList.add('page-fade', 'is-leaving');
          setTimeout(() => {
            document.body.classList.add('is-playing');
            setActiveTab('play');
            _enterPlayWhenReady();
          }, 850);
          return;
        }
        if (v !== 'play' && isPlaying) {
          // Back to a menu while currently in play — ask the iframe
          // to run its exit sequence (camera reset + black fade).
          _demoteFromPopstate = true;
          if (bgFrame && bgFrame.contentWindow) {
            try { bgFrame.contentWindow.postMessage({ type: 'exit-play' }, location.origin); } catch (err) { }
          }
          return;
        }
        // Within-menu navigation (home ↔ about ↔ leaderboard).
        if (!v || v === 'play') { location.reload(); return; }
        swap(location.pathname + location.search + location.hash);
      });
      window.addEventListener('pageshow', (e) => {
        document.body.classList.remove('is-leaving', 'page-fade');
        const m = document.querySelector('main.page');
        if (m) m.classList.remove('is-entering', 'is-leaving');
        // bfcache restore: the bg scene is already painted, so the
        // tabs should be back immediately rather than re-running the
        // "wait for scene" delay. Also drop the boot/loading state
        // — when we navigated away (typically Play → /play), boot had
        // already ended; on restore the body should not be stuck back
        // in the boot state if the browser snapshotted it mid-load.
        if (e.persisted) {
          document.body.classList.remove('is-booting');
          document.body.classList.add('tabs-revealed');
        }
      });
    })();
  </script>
</body>

</html>
