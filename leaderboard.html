<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zoomies — Speedrun Leaderboard</title>
  <meta name="description"
    content="Zoomies — a first-person coin-collecting speedrun in a tiny bedroom. Can you beat the time?" />
  <!-- Share the same stylesheet (and design tokens) the in-game UI uses -->
  <link rel="stylesheet" href="./src/styles/main.css" />
  <!-- Phosphor icon CSS is deferred via preload+onload so it never
       render-blocks the board panel on first paint. The board doubles
       as the loading indicator on direct-load (e.g. arriving from a
       shared run link) and MUST appear with the first frame — a
       third-party CDN stylesheet sitting in the critical path used to
       delay that paint by hundreds of ms (sometimes seconds on a cold
       cache). The <noscript> fallback keeps icons working when JS is
       disabled, in which case render-blocking is acceptable. -->
  <link rel="preload" as="style" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
    onload="this.onload=null;this.rel='stylesheet'" />
  <link rel="preload" as="style" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  </noscript>
  <style>
    /* Inherits the canonical liquid-glass design tokens from main.css
       (--glass, --glass-specular, --glass-blur, --glass-border,
       --glass-border-strong, --font-ui, --font-mono, --text). The few
       page-local tokens below are the cyan/gold accents that the
       in-game pause + finish-dialog leaderboards use as hardcoded hex,
       so the share page reads as the same surface treatment. */
    :root {
      --bg0: #07121d;
      --bg1: #122637;
      --muted: #a8c0d6;
      --lb-accent: #9fe3ff;
      /* matches #fpLeaderboardList .tm + finish-dialog accent */
      --lb-gold: #ffd700;
      /* matches --gold in main.css */
      --lb-gold-edge: rgba(255, 216, 115, 0.46);
      /* matches finish-dialog .own-current border */
    }

    * {
      box-sizing: border-box;
    }

    /* main.css locks html/body { overflow: hidden; height: 100% } for the 3D
       game; override here so the share page scrolls when content overflows.
       !important is required because Vite's production build moves the
       <link rel="stylesheet" href="./src/styles/main.css"> to the END of
       <head> (after this inline <style>), so without !important the
       lock would win on source order during direct-load. (SPA nav
       "fixes" it accidentally because the router re-appends inline
       <style> blocks to the head when swapping <main>, putting them
       last again — but only after the first navigation.) */
    html,
    body {
      height: auto !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text);
      font-weight: var(--weight-regular);
      line-height: 1.45;
      text-rendering: optimizeLegibility;
      /* Fallback gradient in case the iframe fails to load */
      background: radial-gradient(1200px 700px at 18% -12%, #244868 0%, transparent 58%),
        radial-gradient(900px 560px at 110% 10%, #1f3e56 0%, transparent 65%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      padding: 92px 18px 40px;
      position: relative;
      z-index: 0;
    }

    /* Live game scene rendered behind the page */
    #bgFrame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.05);
      opacity: 0;
    }

    #bgFrame.ready {
      opacity: 1;
    }

    /* Same scrim the splash uses (#titleSplash bg) so the live room
       scene shows through behind the glass card the way it does on /. */
    #bgScrim {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(8, 10, 16, 0.55) 0%, rgba(8, 10, 16, 0) 55%),
        radial-gradient(120% 80% at 50% 100%, rgba(8, 10, 16, 0.6) 0%, rgba(8, 10, 16, 0) 55%);
      backdrop-filter: blur(2px) saturate(1.1);
      -webkit-backdrop-filter: blur(2px) saturate(1.1);
    }

    /* Iframe-promotion mode — set by promoteToPlay() in the router
       below. Lets clicks land on the iframe canvas (so the user can
       interact with char-select / play) and fades the scrim out so
       it doesn't sit between them and the picker. Mirrors home.html. */
    body.is-playing #bgFrame {
      pointer-events: auto;
      z-index: 2;
    }

    /* Lift iframe above #bgScrim during play so the scrim's
       backdrop-filter no longer paints over the picker (which lives
       inside the iframe). The picker's iframe-side body::before takes
       over providing constant-strength bedroom blur during the
       transition. */

    @media (prefers-reduced-motion: reduce) {
      #bgFrame {
        display: none;
      }
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    /* ── Leaderboard section ─────────────────────────────────────
       Liquid-glass surface matching the in-game pause/finish boards. */
    .board {
      position: relative;
      background-color: var(--glass);
      background-image: var(--glass-specular);
      border: 1px solid var(--glass-border);
      /* 24px lines up cleanly with the inner mode-tab + row
       * radii (10px / 9px) — the visual offset between outer and
       * inner corners reads as concentric instead of competing. */
      border-radius: 24px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 32px 0 rgba(255, 255, 255, 0.03),
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 1px 0 rgba(0, 0, 0, 0.5);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      overflow: hidden;
    }

    /* ── Boot-as-loading-indicator ────────────────────────────────
       Mirrors home.html: the board is the focal element on /leader-
       board, and (especially when the user lands here from a shared
       run link in chat) it must paint instantly. main.css applies the
       pageContentIn keyframe to every direct child of main.page,
       which would have the board fading in from opacity:0 +
       translateY(12px) + blur(8px) over 0.7s — that's the delay
       we're killing. We override the animation entirely on first
       load and use a CSS background-color transition (opaque dark →
       glass) as the entrance instead, kicked by JS once the iframe
       scene reports ready. SPA-nav into /leaderboard still gets a
       soft fade via <main>'s is-entering choreography. */
    main.page>.board {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
      transition:
        background-color 0.65s cubic-bezier(0.32, 0.72, 0, 1),
        border-color 0.5s ease-out;
    }

    /* Boot state — opaque dark fill replaces var(--glass). The
       backdrop-filter and specular gradient stay set (they're
       invisible against an opaque bg-color), so the morph is a
       single property transition: no composite-layer churn, no
       flash. */
    body.is-booting main.page>.board {
      background-color: #0e2034;
      border-color: rgba(255, 255, 255, 0.06);
    }

    /* While booting, the rows haven't loaded yet (the API fetch is
       still in flight) AND the iframe scene isn't visible yet, so
       the row container would otherwise be a transparent strip
       between two opaque borders. Show a subtle skeleton shimmer
       so the loading state is legible at a glance — the user knows
       the page is alive and data is incoming, not that the board
       is empty. The skeleton rows are removed (innerHTML overwrite)
       the moment loadLeaderboard() returns. */
    .row.row--skeleton {
      grid-template-columns: 38px 1fr auto;
      cursor: default;
    }

    /* Each skel is a softly-filled rounded pill. The shimmer lives on
     * a separate ::after layer carrying a diagonal cyan-tinted beam
     * that sweeps across; overflow:hidden clips it to the pill shape.
     *
     * IMPORTANT: display:block. The .skel is a <span>, which is inline
     * by default and IGNORES width/height. Without this declaration
     * the pills collapse to zero size and the rows render visibly
     * empty — which is exactly what the previous shimmer was doing
     * (silently animating an invisible box). */
    .row--skeleton .skel {
      display: block;
      position: relative;
      height: 12px;
      border-radius: 6px;
      /* Base fill is bright enough to read clearly against the glass
       * card on top of the live 3D scene. Was 0.07 — invisible. */
      background: rgba(225, 240, 255, 0.16);
      overflow: hidden;
      isolation: isolate;
      /* Slow ambient breathe — keeps the pill alive between beam
       * passes. Different period than the beam (2.6s vs 1.8s) so
       * the two animations interfere rather than syncing, which
       * reads as organic rather than mechanical. */
      animation: skelBreathe 2.6s ease-in-out infinite;
    }

    .row--skeleton .skel::after {
      content: '';
      position: absolute;
      /* Negative inset lets the beam's bright edges extend past the
       * pill bounds before overflow:hidden clips them — the
       * highlight reads as a broad light source rather than a
       * gradient painted inside the box. */
      inset: -2px;
      /* Asymmetric specular gradient — broad halo with a hot core.
       * Real light reflections have head/tail asymmetry; symmetric
       * gradients read as "skeleton shimmer cliché". White-hot
       * peak, cyan halo, cool trail.
       *
       * Wider envelope (8% → 92%) than before (25% → 78%) so the
       * highlight reads as a soft volumetric pass rather than a
       * thin sliver — at 78px-wide time pills the previous beam
       * crossed too fast to register as light. The hot core stays
       * narrow (4% wide) so the moment of peak brightness still
       * has snap. 105deg angle gives the beam a touch more lean. */
      background: linear-gradient(105deg,
          transparent 8%,
          rgba(173, 230, 255, 0.18) 28%,
          rgba(220, 245, 255, 0.55) 44%,
          rgba(255, 255, 255, 0.95) 50%,
          rgba(220, 245, 255, 0.55) 56%,
          rgba(173, 230, 255, 0.22) 72%,
          transparent 92%);
      /* Soft blur on the beam itself — Emil's "blur is magic". The
       * gradient stops stay crisp at the source but render as a
       * glow with diffuse edges. ~0.5px is the sweet spot: too
       * little and the gradient looks pasted; too much and the
       * highlight smears into mush. */
      filter: blur(0.5px);
      transform: translateX(-100%);
      will-change: transform;
      animation: skelShimmer 1.8s cubic-bezier(0.7, 0, 0.3, 1) infinite;
    }

    /* Stagger per row so the wave travels DOWN the board as one
     * pulse rather than every row firing in lockstep. Each <li>
     * carries style="--i:N" (1..25). 25ms × 24 = 600ms total
     * cascade — has to be fast enough that every row gets a beam
     * pass BEFORE the API responds (locally ~200ms; on cold cache
     * 1-2s). Earlier 60ms per row meant rows 5-25 never lit up on
     * a fast connection because data overwrote the skeleton before
     * the wave reached them. */
    .row--skeleton .skel::after {
      animation-delay: calc((var(--i, 1) - 1) * 60ms);
    }

    /* Breathe stagger uses HALF the beam stagger so the ambient
     * pulse rolls slower than the beam — the two waves crossing at
     * different speeds is what makes it feel like a living surface
     * instead of a loop. */
    .row--skeleton .skel {
      animation-delay: calc((var(--i, 1) - 1) * 30ms);
    }

    .row--skeleton .skel--rank {
      width: 22px;
    }

    .row--skeleton .skel--name {
      width: 60%;
      max-width: 180px;
    }

    /* margin-left:auto right-aligns the time pill inside its grid
     * cell. (justify-self:end was a no-op here — the grid item is
     * .time, not the skel span inside it.) */
    .row--skeleton .skel--time {
      width: 78px;
      margin-left: auto;
    }

    @keyframes skelShimmer {
      0% {
        transform: translateX(-100%);
      }

      /* Beam crosses by 60% of the cycle, then dwells off-screen for
       * the remaining 40%. The pause is the rhythm — without it the
       * loop feels relentless; with it, it breathes. */
      60% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Ambient breathe — the pill gently inhales between beam passes.
     * Ranges +/- 0.04 alpha around the resting 0.16; perceptible but
     * never demanding. This is the layer that keeps the loading
     * state from feeling dead during the off-cycle dwell. */
    @keyframes skelBreathe {

      0%,
      100% {
        background-color: rgba(225, 240, 255, 0.14);
      }

      50% {
        background-color: rgba(225, 240, 255, 0.22);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .row--skeleton .skel,
      .row--skeleton .skel::after {
        animation: none;
      }
    }

    /* (.board__head removed — the static "Top times" label was
       redundant with the active "Leaderboard" tab, and the meta
       string only carried decorative copy. Connection errors now
       surface through #empty instead.) */

    /* Mode tabs — match the .lb-tabs/.lb-tab pattern in main.css used
       on the pause-menu leaderboard, scaled up slightly for the
       standalone share page. */
    .modeTabs {
      display: flex;
      gap: 6px;
      margin: 14px 14px 8px;
      padding: 4px;
      background: var(--glass-soft);
      border: 1px solid var(--glass-stroke-soft, rgba(255, 255, 255, 0.08));
      border-radius: 10px;
    }

    .modeTab {
      flex: 1;
      appearance: none;
      background: transparent;
      border: 0;
      color: rgba(255, 255, 255, 0.62);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .modeTab:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    .modeTab.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2) inset;
    }

    /* Parenthetical clarifier inside a mode tab label (e.g.
       "100% (all secret coins)"). Reads as secondary at smaller sizes
       and slightly de-emphasized so the primary label dominates. */
    .modeTab__sub {
      margin-left: 4px;
      font-size: 11px;
      font-weight: 500;
      opacity: 0.72;
    }

    /* List rows — same surface + highlight pattern as #finishDialogList
       and #fpLeaderboardList: subtle white-tint resting state, gold-
       tinted background + left-edge gold bar for the player's row
       (.row.hit). Padding is slightly larger here since this is a
       standalone page rather than a side panel. */
    .list {
      list-style: none;
      margin: 0;
      padding: 6px 16px 16px 16px;
      display: grid;
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 38px 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      /* Lock rows to a clean 36px so skeleton rows and real rows match
         exactly, and so the board height is a deterministic multiple
         of (row + gap). Previously rows computed to 38.183px because
         .catBadge / .secretBadge had font-size: 10.5px (× 1.35
         line-height = 14.175px content) which pushed the row past
         its 16px+2px chrome budget. Fixed height + padding kills the
         dependency on child line-box rounding. align-items: center
         vertically centers any child regardless of its own height. */
      height: 36px;
      padding: 0 11px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.03);
      font-size: 13px;
      line-height: 1.35;
      scroll-margin-top: 22px;
    }

    .rank {
      color: var(--muted);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Cat badge — tracks the global .catBadge in main.css (used inside
       the in-game leaderboards). Slightly larger here for the
       standalone page; same material, dot, and gold-row override. */
    .catBadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      /* Whole-pixel font-size; was 10.5 which produced subpixel
         line-box heights that bled into the parent .row height. */
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: 0.02em;
      padding: 2px 8px 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cdd7e5;
      white-space: nowrap;
    }

    .catBadge .catEmoji {
      font-size: 13px;
      line-height: 1;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.35));
    }

    .catBadge .catDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.45);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
    }

    .row.hit .catBadge {
      background: rgba(255, 216, 115, 0.1);
      border-color: rgba(255, 216, 115, 0.3);
      color: #ffeab2;
    }

    .secretBadge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      /* Whole-pixel font-size; was 10.5 — same reasoning as .catBadge. */
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 216, 115, 0.10);
      border: 1px solid rgba(255, 216, 115, 0.32);
      color: var(--lb-gold);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .secretBadge i {
      font-size: 12px;
      line-height: 1;
    }

    .secretBadge.is-zero {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      opacity: 0.6;
    }

    .secretBadge.is-max {
      background: rgba(255, 216, 115, 0.18);
      border-color: rgba(255, 216, 115, 0.55);
      box-shadow: 0 0 0 1px rgba(255, 216, 115, 0.18) inset;
    }

    .time {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--lb-accent);
      font-weight: 800;
      letter-spacing: 0.02em;
      /* Nudge the mono digits down ~2px. The mono face's cap-height
         sits higher in its em-box than the proportional body font,
         so flex/grid centering visually skews top-heavy. */
      padding-top: 2px;
    }

    .row.hit {
      background: rgba(255, 216, 115, 0.16);
      border-color: var(--lb-gold-edge);
      box-shadow: 0 0 0 1px rgba(255, 216, 115, 0.15), inset 3px 0 0 rgba(255, 226, 140, 0.65);
    }

    .row.hit .time,
    .row.hit .name {
      color: var(--lb-gold);
    }

    /* Empty / error state — occupies the whole list area when the
     * board has no rows. Two variants: data success but zero entries
     * (no runs yet) and fetch failure (connection issue). Same
     * layout, different icon and copy. We render both options as
     * markup via innerHTML in JS — the icon + headline + sub combo
     * reads as a small illustration rather than a status line. */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 56px 24px 64px;
      text-align: center;
      color: var(--muted);
      /* Subtle entrance — the empty state appears AFTER the skeleton
       * cascade resolves, so a brief fade+rise softens the swap and
       * tells the eye "this is the answer, not still loading". */
      animation: emptyIn 0.45s cubic-bezier(0.32, 0.72, 0, 1) both;
    }

    .empty__icon {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--lb-accent);
      /* Soft cyan halo behind the glyph — tiny illustration trick.
       * The drop-shadow filter renders a true circular glow that
       * sits underneath the fill, no extra DOM node needed. */
      filter:
        drop-shadow(0 0 24px rgba(159, 227, 255, 0.35))
        drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    }

    .empty__icon i {
      font-size: 64px;
      line-height: 1;
    }

    /* Error variant tints the icon warm-amber so the user reads
     * "something went wrong" without us having to spell it out
     * twice (icon + copy). */
    .empty--error .empty__icon {
      color: #ffb78a;
      filter:
        drop-shadow(0 0 24px rgba(255, 183, 138, 0.32))
        drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    }

    .empty__headline {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: rgba(232, 244, 255, 0.92);
    }

    .empty__sub {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      max-width: 32ch;
      color: var(--muted);
    }

    .empty__sub a {
      color: var(--lb-accent);
      text-decoration: none;
      border-bottom: 1px dashed rgba(159, 227, 255, 0.45);
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .empty__sub a:hover {
      color: #fff;
      border-bottom-color: rgba(255, 255, 255, 0.7);
    }

    @keyframes emptyIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .empty {
        animation: none;
      }
    }

    .footnote {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      opacity: 0.85;
    }

    .footnote a {
      color: var(--lb-accent);
      text-decoration: none;
    }

    .footnote a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      body {
        padding: 78px 12px 32px;
      }

      .board {
        border-radius: 26px;
      }

      .row {
        grid-template-columns: 32px 1fr auto auto auto;
        padding: 7px 9px;
        gap: 6px;
      }

      .catBadge span:last-child {
        display: none;
      }
    }
  </style>
</head>

<body class="is-booting">
  <iframe id="bgFrame" src="/play?bg=1" title="" aria-hidden="true" tabindex="-1" referrerpolicy="same-origin"></iframe>
  <div id="bgScrim" aria-hidden="true">
    <div class="bg-grid"></div>
  </div>

  <nav class="site-tabs" aria-label="Primary">
    <a class="site-tab" href="/" data-tab="home">
      <i class="site-tab__icon site-tab__icon--regular ph ph-house"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-house"></i><span>Home</span>
    </a>
    <a class="site-tab" href="/leaderboard" data-tab="leaderboard">
      <i class="site-tab__icon site-tab__icon--regular ph ph-trophy"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-trophy"></i><span>Leaderboard</span>
    </a>
    <a class="site-tab" href="/about" data-tab="about">
      <i class="site-tab__icon site-tab__icon--regular ph ph-info"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-info"></i><span>About</span>
    </a>
  </nav>

  <main class="page">
    <section class="board">
      <div id="modeTabs" class="modeTabs" role="tablist" aria-label="Leaderboard mode">

  <script>
    // One-shot: skip the live-scene iframe on touch / narrow devices to
    // save battery. Runs only on the initial document load — once we
    // start SPA-swapping <main> via the router, the iframe persists, so
    // this never needs to re-run.
    (function () {
      const bgFrame = document.getElementById('bgFrame');
      const _isCoarse = matchMedia('(pointer: coarse)').matches;
      const _isNarrow = window.innerWidth < 720;

      // Tabs start hidden (CSS) and slide down from above once the
      // scene is up AND the page card has had time to settle. This
      // keeps the entrance from racing the rest of the page — the
      // user reads the room first, the chrome arrives last.
      let _tabsRevealed = false;
      function revealTabs() {
        if (_tabsRevealed) return;
        _tabsRevealed = true;
        document.body.classList.add('tabs-revealed');
      }

      // End the boot/loading state. Removing .is-booting from <body>
      // triggers the CSS transition on .board's background-color
      // (opaque → glass). Same DOM element throughout — the morph is
      // a pure CSS state change, not a swap. Skeleton rows stay until
      // loadLeaderboard() overwrites them with the real data; that
      // fetch runs concurrently with iframe boot.
      let _bootEnded = false;
      function endBoot() {
        if (_bootEnded) return;
        _bootEnded = true;
        document.body.classList.remove('is-booting');
      }

      if (bgFrame && (_isCoarse || _isNarrow)) {
        bgFrame.remove();
        // No live scene to wait on — end boot immediately so the
        // board morphs to its glass-over-fallback-gradient look,
        // then reveal tabs after a beat.
        endBoot();
        setTimeout(revealTabs, 1100);
      } else if (bgFrame) {
        function _bgReady() {
          bgFrame.classList.add('ready');
          // Mark the iframe as scene-ready so a Play click that landed
          // before boot finished can now flush its queued enter-play
          // (matches home.html's same-named hook).
          bgFrame.setAttribute('data-scene-ready', '1');
          if (typeof window.__flushPendingPlay === 'function') window.__flushPendingPlay();
          // End boot on the same frame the iframe is revealed — the
          // iframe sits at opacity:0 → 1 (snap, no transition) BEHIND
          // the still-opaque board, so the user can't see it pop.
          // The board then morphs to glass over 0.65s and the now-
          // visible live scene refracts through it. Tabs come in last.
          endBoot();
          setTimeout(revealTabs, 520);
        }
        window.addEventListener('message', (e) => {
          if (e.origin !== location.origin) return;
          if (e.data && e.data.type === 'bg-scene-ready') _bgReady();
        });
        setTimeout(_bgReady, 4000);
      } else {
        endBoot();
        setTimeout(revealTabs, 1100);
      }
    })();
  </script>
  <script>
    // ── Leaderboard view init ────────────────────────────────────────
    // Wrapped as a single re-entrant function so the cross-page SPA
    // router can call it again after swapping <main class="page"> in
    // place. Each call re-grabs fresh DOM nodes, re-binds listeners,
    // and re-loads from the API based on the current URL — no
    // top-level `const` declarations that would clash on re-execution.
    window.__initLeaderboard = function __initLeaderboard() {
      const rowsEl = document.getElementById('rows');
      const emptyEl = document.getElementById('empty');
      if (!rowsEl) return; // not on the leaderboard view (defensive)

      const query = new URLSearchParams(location.search);
      const hitId = query.get('entry') || '';
      // 'allsecrets' is a virtual mode — it filters across both real
      // modes (normal + speed) to runs that found every secret coin.
      // The worker accepts it via ?onlyAllSecrets=1 rather than as a
      // mode value, so the client maps it at fetch time.
      const VALID_MODES = ['normal', 'speed', 'allsecrets'];
      function sanitizeMode(v) {
        const k = String(v || '').trim().toLowerCase();
        return VALID_MODES.includes(k) ? k : 'normal';
      }
      let currentMode = sanitizeMode(query.get('mode'));

      function escapeHtml(v) {
        return String(v || '').replace(/[&<>"']/g, (ch) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
      }

      function fmtRun(ms) {
        const total = Math.max(0, Math.floor(Number(ms) || 0));
        const m = Math.floor(total / 60000);
        const s = Math.floor((total % 60000) / 1000);
        const z = total % 1000;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(z).padStart(3, '0')}`;
      }

      const CAT_MODEL_EMOJI = { classic: '🐱', toon: '🦁', bababooey: '🐿️', totodile: '🐊', korra: '🐈' };
      const CAT_MODEL_LABEL = { classic: 'Classic', toon: 'Toon', bababooey: 'Bababooey', totodile: 'Totodile', korra: 'Cursed Korra' };
      const BASE_TOTAL_SECRETS = 10;
      function catBadgeHtml(row) {
        const model = String((row && row.catModel) || 'classic').toLowerCase();
        const emoji = CAT_MODEL_EMOJI[model] || CAT_MODEL_EMOJI.classic;
        const label = CAT_MODEL_LABEL[model] || 'Cat';
        return `<span class="catBadge" title="${escapeHtml(label)}"><span class="catEmoji">${emoji}</span><span>${label}</span></span>`;
      }

      function secretBadgeHtml(row, totalSecrets) {
        const n = Math.max(0, Math.floor(Number(row && row.secretCoins) || 0));
        const goal = Math.max(1, Math.floor(Number(totalSecrets) || BASE_TOTAL_SECRETS));
        const cls = n === 0 ? ' is-zero' : (n >= goal ? ' is-max' : '');
        const title = `${n} of ${goal} secret coin${n === 1 ? '' : 's'} found`;
        return `<span class="secretBadge${cls}" title="${escapeHtml(title)}" aria-label="${escapeHtml(title)}"><i class="ph-fill ph-key"></i>${n}/${goal}</span>`;
      }

      // ── Stale-while-revalidate cache ────────────────────────────
      // Cache successful API responses per-mode in sessionStorage so
      // the SECOND visit to /leaderboard within a tab session paints
      // instantly (no shimmer flash) while a background fetch
      // revalidates. Cache lives only for the tab's lifetime so it
      // can never go stale across browser sessions; within a session
      // we always revalidate, so even an "old" cache is just a
      // sub-second visual head-start.
      //
      // Errors are NOT cached — a failed fetch shouldn't poison the
      // next visit. If the previous visit failed, we fall back to
      // the shimmer-then-data flow naturally.
      const cacheKeyFor = (mode) => `lb-cache-v1:${mode}`;
      // Track which run-id we've already auto-scrolled to so we
      // don't yank the page twice when SWR paints cached then fresh.
      let scrolledHitId = null;

      function readCache(mode) {
        try {
          const raw = sessionStorage.getItem(cacheKeyFor(mode));
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.rows)) return null;
          return parsed.rows;
        } catch (_) {
          return null;
        }
      }

      function writeCache(mode, rows) {
        try {
          sessionStorage.setItem(cacheKeyFor(mode), JSON.stringify({ rows }));
        } catch (_) {
          // Quota or disabled storage — silently skip; SWR is a
          // perf nicety, not load-bearing.
        }
      }

      function renderEmpty(errorMsg) {
        rowsEl.innerHTML = '';
        if (errorMsg === 'connection') {
          emptyEl.classList.add('empty--error');
          emptyEl.classList.remove('empty--noruns');
          emptyEl.innerHTML =
            '<div class="empty__icon" aria-hidden="true"><i class="ph-fill ph-cloud-slash"></i></div>' +
            '<h2 class="empty__headline">Couldn\u2019t reach the leaderboard</h2>' +
            '<p class="empty__sub">The network or the API is taking a nap. Try again in a moment \u2014 your runs are safe.</p>';
        } else {
          emptyEl.classList.remove('empty--error');
          emptyEl.classList.add('empty--noruns');
          const tabCopy = currentMode === 'allsecrets'
            ? 'No 100% runs yet \u2014 grab every secret coin to claim this board.'
            : currentMode === 'speed'
              ? 'No speed-mode runs yet \u2014 be the first to clock in.'
              : 'No runs on the board yet \u2014 be the first to clock in.';
          emptyEl.innerHTML =
            '<div class="empty__icon" aria-hidden="true"><i class="ph-fill ph-trophy"></i></div>' +
            '<h2 class="empty__headline">An open podium</h2>' +
            '<p class="empty__sub">' + tabCopy + ' <a href="/" data-spa-link>Play now \u2192</a></p>';
        }
        emptyEl.hidden = false;
        emptyEl.style.display = 'flex';
        // eslint-disable-next-line no-unused-expressions
        emptyEl.offsetWidth;
      }

      function renderRows(rows) {
        emptyEl.hidden = true;
        emptyEl.style.display = 'none';

        const secretGoal = rows.reduce((max, row) => {
          const n = Math.max(0, Math.floor(Number(row && row.secretCoins) || 0));
          return Math.max(max, n);
        }, BASE_TOTAL_SECRETS);

        rowsEl.innerHTML = rows.map((r, i) => {
          const rowId = String(r.id || '');
          const hit = hitId && rowId === hitId;
          return `<li class="row${hit ? ' hit' : ''}" data-entry-id="${escapeHtml(rowId)}">
            <div class="rank">#${i + 1}</div>
            <div class="name">${escapeHtml(r.name)}</div>
            ${catBadgeHtml(r)}
            ${secretBadgeHtml(r, secretGoal)}
            <div class="time">${fmtRun(r.timeMs)}</div>
          </li>`;
        }).join('');

        // Auto-scroll to the highlighted run only the first time we
        // see it on screen — if SWR painted from cache and the fresh
        // fetch also contains the same hit row, the second render
        // shouldn't re-scroll the page.
        if (hitId && scrolledHitId !== hitId) {
          const hitEl = rowsEl.querySelector(`[data-entry-id="${CSS.escape(hitId)}"]`);
          if (hitEl) {
            scrolledHitId = hitId;
            setTimeout(() => hitEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
          }
        }
      }

      async function loadLeaderboard() {
        // Snapshot the mode at call time — if the user switches tabs
        // mid-fetch, we want to discard the in-flight result rather
        // than stomp the new tab's data with it.
        const mode = currentMode;

        // 1. Stale paint from cache, if available. This skips the
        //    shimmer entirely on revisits within the same tab.
        const cached = readCache(mode);
        let paintedFromCache = false;
        if (cached && cached.length) {
          renderRows(cached);
          paintedFromCache = true;
        }

        // 2. Always revalidate against the server.
        let rows = [];
        let errorMsg = '';
        try {
          // The 'allsecrets' virtual tab filters cross-mode for runs
          // that grabbed every secret coin. Send onlyAllSecrets=1 and
          // omit the mode param so the worker scans both normal +
          // speed entries. Real modes (normal/speed) keep the mode
          // filter as before.
          const apiUrl = mode === 'allsecrets'
            ? '/api/leaderboard?onlyAllSecrets=1'
            : `/api/leaderboard?mode=${encodeURIComponent(mode)}`;
          const res = await fetch(apiUrl, { credentials: 'same-origin' });
          const data = await res.json();
          if (!res.ok || data.ok === false) throw new Error((data && data.message) || `API ${res.status}`);
          rows = Array.isArray(data.leaderboard) ? data.leaderboard : [];
        } catch (err) {
          rows = [];
          errorMsg = 'connection';
        }

        // 3. If the user switched modes while we were fetching, bail
        //    — the newer loadLeaderboard() call owns the UI now.
        if (mode !== currentMode) return;

        // 4. On error, only show the error state if we have nothing
        //    on screen. If cache already painted, leave it alone — a
        //    one-off network blip shouldn't blow away good data.
        if (errorMsg) {
          if (!paintedFromCache) renderEmpty('connection');
          return;
        }

        if (!rows.length) {
          renderEmpty('');
          // Cache the empty result too, so the empty state paints
          // instantly next visit instead of flashing shimmer.
          writeCache(mode, []);
          return;
        }

        // 5. Diff against what's painted. If the rows are identical,
        //    skip the DOM swap — saves a render and prevents the
        //    .hit row's gold-edge from flickering on revalidate.
        const fresh = JSON.stringify(rows);
        const stale = cached ? JSON.stringify(cached) : '';
        if (fresh !== stale) {
          renderRows(rows);
          writeCache(mode, rows);
        } else if (!paintedFromCache) {
          // Cache existed but was empty-array; we painted nothing
          // and now have rows — render them.
          renderRows(rows);
          writeCache(mode, rows);
        }
      }

      function syncModeTabsUI() {
        const tabs = document.querySelectorAll('#modeTabs [data-lb-mode]');
        tabs.forEach((btn) => {
          const active = btn.getAttribute('data-lb-mode') === currentMode;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-selected', active ? 'true' : 'false');
        });
      }

      document.getElementById('modeTabs').addEventListener('click', (ev) => {
        const btn = ev.target && ev.target.closest && ev.target.closest('[data-lb-mode]');
        if (!btn) return;
        const next = sanitizeMode(btn.getAttribute('data-lb-mode'));
        if (next === currentMode) return;
        currentMode = next;
        const url = new URL(location.href);
        if (currentMode === 'normal') url.searchParams.delete('mode');
        else url.searchParams.set('mode', currentMode);
        history.replaceState(null, '', url.toString());
        syncModeTabsUI();
        loadLeaderboard();
      });

      syncModeTabsUI();
      loadLeaderboard();
    };
    window.__initLeaderboard();
  </script>

  <script>
    // Shared SPA router for the iframe-backed views. Identical to the
    // copy in about.html — kept duplicated rather than shared so each
    // page is fully self-contained (and so a fetch failure on one
    // doesn't break the other). See about.html for the design rationale.
    (function () {
      const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

      function viewFor(path) {
        path = path.replace(/\/+$/, '') || '/';
        if (path === '/' || path === '/home' || path === '/home.html') return 'home';
        if (path === '/about' || path === '/about.html') return 'about';
        if (path === '/leaderboard' || path === '/leaderboard.html' || path.startsWith('/leaderboard')) return 'leaderboard';
        if (path === '/play' || path === '/vite-index.html' || path === '/index.html') return 'play';
        return null;
      }

      function setActiveTab(view) {
        document.querySelectorAll('.site-tabs .site-tab').forEach(t => {
          const id = t.getAttribute('data-tab');
          const active = id === view;
          t.classList.toggle('is-active', active);
          if (active) t.setAttribute('aria-current', 'page');
          else t.removeAttribute('aria-current');
        });
        updatePill();
      }

      // Active-tab pill — a single absolutely-positioned div behind
      // the tabs that slides + resizes to match the active one. Same
      // pattern Stripe uses on its blog category nav. We animate
      // transform (GPU) and width together so the rounded ends don't
      // distort the way scaleX would.
      function buildPill() {
        const nav = document.querySelector('.site-tabs');
        if (!nav || nav.querySelector('.site-tabs-pill')) return;
        const pill = document.createElement('div');
        pill.className = 'site-tabs-pill';
        pill.setAttribute('aria-hidden', 'true');
        nav.insertBefore(pill, nav.firstChild);
        nav.classList.add('has-pill');
      }

      function updatePill() {
        const nav = document.querySelector('.site-tabs');
        const pill = nav && nav.querySelector('.site-tabs-pill');
        const active = nav && nav.querySelector('.site-tab.is-active');
        if (!nav || !pill || !active) return;
        const navRect = nav.getBoundingClientRect();
        const tabRect = active.getBoundingClientRect();
        const left = tabRect.left - navRect.left;
        pill.style.transform = `translateX(${left}px)`;
        pill.style.width = `${tabRect.width}px`;
      }

      (function tagInitial() {
        const v = viewFor(location.pathname);
        if (!v || v === 'play') return;
        document.querySelectorAll('head > style').forEach(s => {
          if (!s.dataset.view) s.dataset.view = v;
        });
        const main = document.querySelector('main.page');
        if (main && !main.dataset.view) main.dataset.view = v;
      })();
      buildPill();
      setActiveTab(viewFor(location.pathname));
      // Enable the pill's clip-path transition on the next frame so
      // the initial position doesn't slide in from the left on load.
      requestAnimationFrame(() => {
        const nav = document.querySelector('.site-tabs');
        if (nav) nav.classList.add('pill-ready');
      });
      window.addEventListener('resize', updatePill);
      // Webfonts can resize the tab labels after first paint; re-measure
      // when they're ready so the pill snaps to the final width.
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(updatePill).catch(() => { });
      }

      function fullNav(href, opts) {
        if (reduced) { location.href = href; return; }
        document.body.classList.add('page-fade', 'is-leaving');
        // Play CTA gets a longer hold so the tabs visibly lift away
        // before the next document loads — the entire transition reads
        // as one motion (chrome clears, char-select bounces in over
        // the same room scene). Other full-navs keep the snappy 160ms.
        // The 480ms hold roughly matches the .site-tabs exit transition
        // (0.55s transform / 0.5s filter) so most of the lift-and-blur
        // motion plays before the document is torn down.
        const wait = (opts && opts.slow) ? 480 : 160;
        setTimeout(() => { location.href = href; }, wait);
      }

      async function swap(href) {
        const targetView = viewFor(href);
        if (!targetView || targetView === 'play') { fullNav(href); return; }

        const oldMain = document.querySelector('main.page');

        // Start the fetch immediately so it overlaps with the exit
        // animation (saves a noticeable amount of perceived latency
        // on slower connections).
        const fetchPromise = fetch(href, { credentials: 'same-origin' }).then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        });

        // Exit: animate the OLD <main> out via .is-leaving on the
        // element itself. Each direction owning its own class is what
        // makes the entrance work cleanly — see CSS comment.
        if (oldMain && !reduced) oldMain.classList.add('is-leaving');
        const exitWait = reduced ? 0 : 200;

        let html;
        try {
          html = await fetchPromise;
        } catch (e) {
          location.href = href;
          return;
        }
        if (exitWait) await new Promise(r => setTimeout(r, exitWait));

        const doc = new DOMParser().parseFromString(html, 'text/html');
        document.title = doc.title || document.title;

        document.querySelectorAll('head > style[data-view]').forEach(s => s.remove());
        doc.querySelectorAll('head > style').forEach(s => {
          const clone = s.cloneNode(true);
          clone.dataset.view = targetView;
          document.head.appendChild(clone);
        });

        const newMain = doc.querySelector('main.page');
        const currentOldMain = document.querySelector('main.page');
        if (newMain && currentOldMain) {
          newMain.dataset.view = targetView;
          // Mark this main as SPA-inserted so CSS can suppress any
          // inner keyframe animations (see the data-spa rule in
          // main.css) that would otherwise blink on top of our outer
          // page transition.
          newMain.dataset.spa = '1';
          if (!reduced) newMain.classList.add('is-entering');
          currentOldMain.replaceWith(newMain);
          // Force a layout read so the entering state is committed to
          // the style cache before we remove the class. Without this
          // the browser folds the from/to into one paint and the
          // entrance is skipped (the stuttery "blink in" we're fixing).
          if (!reduced) {
            void newMain.offsetWidth;
            requestAnimationFrame(() => newMain.classList.remove('is-entering'));
          }
        }

        history.pushState({ view: targetView }, '', href);
        setActiveTab(targetView);

        if (targetView === 'leaderboard' && typeof window.__initLeaderboard === 'function') {
          window.__initLeaderboard();
        }

        window.scrollTo(0, 0);
      }

      document.addEventListener('click', (e) => {
        const a = e.target.closest && e.target.closest('a[href]');
        if (!a) return;
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
        if (a.target && a.target !== '_self') return;

        let url;
        try { url = new URL(a.href, location.href); }
        catch { return; }
        if (url.origin !== location.origin) return;

        // Top tabs: SPA-swap when staying within iframe-backed views.
        if (a.classList.contains('site-tab')) {
          const targetView = viewFor(url.pathname);
          const currentView = viewFor(location.pathname);
          if (a.classList.contains('is-active')) { e.preventDefault(); return; }
          if (targetView && targetView !== 'play' && currentView && currentView !== 'play') {
            e.preventDefault();
            swap(url.pathname + url.search + url.hash);
          } else {
            e.preventDefault();
            fullNav(a.href);
          }
          return;
        }

        // The big Play CTA — promote the existing bg iframe in place
        // instead of doing a top-level navigation. Same path home uses:
        // skips the three.js scene rebuild that fullNav('/play') would
        // cause, so the room flows seamlessly into the picker.
        if (a.hasAttribute('data-play-cta')) {
          e.preventDefault();
          promoteToPlay(a.href);
        }
      });

      // ── Iframe promotion (mirrors home.html) ──────────────────
      const bgFrame = document.getElementById('bgFrame');

      let _pendingPlay = false;
      function _sendEnterPlay() {
        if (!bgFrame || !bgFrame.contentWindow) return;
        try { bgFrame.contentWindow.postMessage({ type: 'enter-play' }, location.origin); } catch (e) { }
        try { bgFrame.contentWindow.focus(); } catch (e) { }
      }
      window.__flushPendingPlay = function () {
        if (!_pendingPlay) return;
        _pendingPlay = false;
        _sendEnterPlay();
      };
      function _enterPlayWhenReady() {
        if (bgFrame && bgFrame.getAttribute('data-scene-ready') === '1') {
          _sendEnterPlay();
        } else {
          _pendingPlay = true;
        }
      }

      function promoteToPlay(href) {
        // Capture the path the user is returning to. Stored on a
        // shared global so whichever page's IIFE happens to be the
        // active one (only the FIRST loaded page's script runs —
        // SPA swap doesn't re-execute) returns to the right URL.
        window.__playReturnPath = location.pathname + location.search + location.hash;
        if (reduced) {
          history.pushState({ view: 'play' }, '', href || '/play');
          document.body.classList.add('is-playing');
          _enterPlayWhenReady();
          setActiveTab('play');
          return;
        }
        // Animate leaderboard chrome out (tabs lift, main fades).
        document.body.classList.add('page-fade', 'is-leaving');
        history.pushState({ view: 'play' }, '', href || '/play');
        setActiveTab('play');
        // Three-beat promotion (matches home.html):
        //   1. 0–700ms   chrome exits
        //   2. 700–850ms clean bedroom beat
        //   3. 850ms+    picker fades in
        setTimeout(() => {
          document.body.classList.add('is-playing');
          _enterPlayWhenReady();
        }, 850);
      }

      function demoteFromPlay({ updateHistory = true } = {}) {
        // Triggered by the iframe's { type: 'play-exited' } message
        // after it has reset its camera and re-applied is-bg under
        // its black overlay. Bring the chrome back in and route to
        // wherever the user came FROM (which may not be /leaderboard
        // if they SPA-swapped to /about or /home before clicking Play).
        const ret = window.__playReturnPath || '/leaderboard' + location.search + location.hash;
        const retView = viewFor(ret) || 'leaderboard';
        if (updateHistory) {
          history.pushState({ view: retView }, '', ret);
        }
        setActiveTab(retView);
        document.body.classList.remove('is-playing');
        document.body.classList.remove('is-leaving');
        setTimeout(() => document.body.classList.remove('page-fade'), 700);
      }

      let _demoteFromPopstate = false;
      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        const data = e.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'play-exited') {
          demoteFromPlay({ updateHistory: !_demoteFromPopstate });
          _demoteFromPopstate = false;
        }
      });

      window.addEventListener('popstate', () => {
        const v = viewFor(location.pathname);
        const isPlaying = document.body.classList.contains('is-playing');
        // Cross-promotion-boundary cases: between /play and the menu
        // we drive promotion via postMessage rather than reload.
        if (v === 'play' && !isPlaying) {
          // Forward to /play while currently on the leaderboard view.
          document.body.classList.add('page-fade', 'is-leaving');
          setTimeout(() => {
            document.body.classList.add('is-playing');
            setActiveTab('play');
            _enterPlayWhenReady();
          }, 850);
          return;
        }
        if (v !== 'play' && isPlaying) {
          // Back to leaderboard while currently in play — ask the
          // iframe to run its exit sequence (camera reset + fade).
          _demoteFromPopstate = true;
          if (bgFrame && bgFrame.contentWindow) {
            try { bgFrame.contentWindow.postMessage({ type: 'exit-play' }, location.origin); } catch (err) { }
          }
          return;
        }
        if (!v || v === 'play') { location.reload(); return; }
        swap(location.pathname + location.search + location.hash);
      });
      window.addEventListener('pageshow', (e) => {
        document.body.classList.remove('is-leaving', 'page-fade');
        const m = document.querySelector('main.page');
        if (m) m.classList.remove('is-entering', 'is-leaving');
        // bfcache restore: the bg scene is already painted, so the
        // tabs should be back immediately rather than re-running the
        // "wait for scene" delay. Also drop the boot/loading state
        // so the board doesn't re-morph from opaque on restore.
        if (e.persisted) {
          document.body.classList.remove('is-booting');
          document.body.classList.add('tabs-revealed');
        }
      });
    })();
  </script>
</body>

</html>
