<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DIY Air Purifier — Speedrun Challenge</title>
  <meta name="description" content="A first-person coin-collecting speedrun in a tiny bedroom. Can you beat the time?" />
  <!-- Share the same stylesheet (and design tokens) the in-game UI uses -->
  <link rel="stylesheet" href="./src/styles/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <style>
    :root {
      --bg0: #07121d;
      --bg1: #122637;
      --card: rgba(8, 16, 27, 0.78);
      --edge: rgba(128, 197, 243, 0.32);
      --text: #e6f3ff;
      --muted: #a8c0d6;
      --accent: #9fe3ff;
      --gold: #ffd873;
      --goldEdge: rgba(255, 216, 115, 0.45);
      --font-ui: "Nunito Sans Variable", "Nunito Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    /* main.css locks html/body { overflow: hidden; height: 100% } for the 3D
       game; override here so the share page scrolls when content overflows. */
    html, body { height: auto; overflow-x: hidden; overflow-y: auto; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text);
      line-height: 1.45;
      text-rendering: optimizeLegibility;
      /* Fallback gradient in case the iframe fails to load */
      background: radial-gradient(1200px 700px at 18% -12%, #244868 0%, transparent 58%),
                  radial-gradient(900px 560px at 110% 10%, #1f3e56 0%, transparent 65%),
                  linear-gradient(180deg, var(--bg1), var(--bg0));
      padding: 24px 18px 40px;
      position: relative;
      z-index: 0;
    }
    /* Live game scene rendered behind the page */
    #bgFrame {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      border: 0; z-index: 0; pointer-events: none;
      filter: saturate(1.05);
      opacity: 0; transition: opacity 0.6s ease;
    }
    #bgFrame.ready { opacity: 1; }
    #bgScrim {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(120% 80% at 50% 30%, rgba(7,18,29,0.4) 0%, rgba(7,18,29,0.78) 70%, rgba(7,18,29,0.92) 100%);
      backdrop-filter: blur(2px) saturate(1.05);
      -webkit-backdrop-filter: blur(2px) saturate(1.05);
    }
    @media (prefers-reduced-motion: reduce) { #bgFrame { display: none; } }

    .page {
      position: relative;
      z-index: 2;
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    /* ── Hero challenge card ──────────────────────────────────── */
    .hero {
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 22px;
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 28px 26px 26px;
      display: grid;
      gap: 18px;
    }
    .hero__eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent);
      opacity: 0.92;
    }
    .hero__eyebrow i { font-size: 13px; }
    .hero__headline {
      margin: 0;
      font-size: clamp(22px, 3.4vw, 32px);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: -0.01em;
    }
    .hero__headline .who { color: var(--gold); }
    .hero__headline .time {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--gold);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .hero__pitch {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 56ch;
    }
    .hero__pitch b { color: #d9ebff; font-weight: 700; }
    .hero__cta {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin-top: 4px;
    }
    .playBtn {
      flex: 0 1 auto;
      padding: 16px 32px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.02em;
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .playBtn i { font-size: 1.15em; }
    .miniBtn {
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.16);
      color: #d9ebff;
      border-radius: var(--r-md, 12px);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .miniBtn:hover { border-color: rgba(255,255,255,0.36); background: rgba(255,255,255,0.04); }
    .miniBtn i { font-size: 14px; }

    /* ── Leaderboard section (social proof) ───────────────────── */
    .board {
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .board__head {
      padding: 14px 18px 10px;
      display: flex; align-items: baseline; gap: 10px; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .board__head h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .board__meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .list { list-style: none; margin: 0; padding: 8px; display: grid; gap: 6px; }
    .row {
      display: grid;
      grid-template-columns: 38px 1fr auto auto auto;
      gap: 10px; align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      padding: 8px 11px;
      font-size: 13px;
      line-height: 1.35;
      scroll-margin-top: 22px;
    }
    .rank { color: var(--muted); font-weight: 700; font-variant-numeric: tabular-nums; }
    .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .catBadge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em;
      padding: 2px 8px 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: #cdd7e5;
      white-space: nowrap;
    }
    .catBadge .catEmoji { font-size: 13px; line-height: 1; filter: drop-shadow(0 1px 0 rgba(0,0,0,0.35)); }
    .catBadge .catDot {
      width: 8px; height: 8px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.45);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
      flex-shrink: 0;
    }
    .row.hit .catBadge { background: rgba(255,216,115,0.1); border-color: rgba(255,216,115,0.3); color: #ffeab2; }
    .secretBadge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; font-weight: 800; letter-spacing: 0.02em;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 216, 115, 0.10);
      border: 1px solid rgba(255, 216, 115, 0.32);
      color: var(--gold);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .secretBadge i { font-size: 12px; line-height: 1; }
    .secretBadge.is-zero {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      opacity: 0.6;
    }
    .secretBadge.is-max {
      background: rgba(255, 216, 115, 0.18);
      border-color: rgba(255, 216, 115, 0.55);
      box-shadow: 0 0 0 1px rgba(255, 216, 115, 0.18) inset;
    }
    .time {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .row.hit {
      background: rgba(255, 216, 115, 0.13);
      border-color: var(--goldEdge);
      box-shadow: 0 0 0 1px rgba(255, 216, 115, 0.18) inset;
    }
    .row.hit .time, .row.hit .name { color: var(--gold); }
    .empty { padding: 18px; color: var(--muted); font-size: 13px; }

    .footnote {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      opacity: 0.85;
    }
    .footnote a { color: var(--accent); text-decoration: none; }
    .footnote a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      body { padding: 16px 12px 32px; }
      .hero { padding: 22px 18px 20px; border-radius: 18px; }
      .playBtn { width: 100%; justify-content: center; }
      .miniBtn { width: 100%; justify-content: center; }
      .row { grid-template-columns: 32px 1fr auto auto auto; padding: 7px 9px; gap: 6px; }
      .catBadge span:last-child { display: none; }
    }
  </style>
</head>
<body>
  <iframe
    id="bgFrame"
    src="/?bg=1"
    title=""
    aria-hidden="true"
    tabindex="-1"
    loading="lazy"
    referrerpolicy="same-origin"
  ></iframe>
  <div id="bgScrim" aria-hidden="true"></div>

  <main class="page">
    <section class="hero" aria-labelledby="heroHeadline">
      <span id="heroEyebrow" class="hero__eyebrow"><i class="ph-fill ph-trophy"></i> Speedrun Challenge</span>
      <h1 id="heroHeadline" class="hero__headline">Loading challenge…</h1>
      <p class="hero__pitch">
        <b>DIY Air Purifier</b> is a first-person speedrun in a tiny bedroom. Grab every coin
        as fast as you can — no install, plays in your browser.
      </p>
      <div class="hero__cta">
        <a class="playBtn glass-btn glass-btn--primary" href="/play"><i class="ph-fill ph-play"></i> Play now</a>
        <button id="copyLinkBtn" class="miniBtn" type="button"><i class="ph ph-link"></i> Copy link</button>
      </div>
    </section>

    <section class="board" aria-labelledby="boardHeadline">
      <header class="board__head">
        <h2 id="boardHeadline">Top times</h2>
        <span id="boardMeta" class="board__meta"></span>
      </header>
      <ol id="rows" class="list" aria-live="polite"></ol>
      <div id="empty" class="empty" style="display:none">No runs yet — be the first.</div>
    </section>

    <p class="footnote">Created by <a href="https://brandonmoore.design" target="_blank" rel="noopener">Brandon</a>.</p>
  </main>

  <script>
    const rowsEl = document.getElementById('rows');
    const emptyEl = document.getElementById('empty');
    const heroHeadline = document.getElementById('heroHeadline');
    const heroEyebrow = document.getElementById('heroEyebrow');
    const boardMeta = document.getElementById('boardMeta');
    const copyBtn = document.getElementById('copyLinkBtn');

    const query = new URLSearchParams(location.search);
    const hitId = query.get('entry') || '';

    function escapeHtml(v) {
      return String(v || '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function fmtRun(ms) {
      const total = Math.max(0, Math.floor(Number(ms) || 0));
      const m = Math.floor(total / 60000);
      const s = Math.floor((total % 60000) / 1000);
      const z = total % 1000;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(z).padStart(3, '0')}`;
    }

    const CAT_MODEL_EMOJI = { classic: '🐱', toon: '🦁', bababooey: '🐿️', totodile: '🐊' };
    const CAT_MODEL_LABEL = { classic: 'Classic', toon: 'Toon', bababooey: 'Bababooey', totodile: 'Totodile' };
    const CAT_COLOR_HEX = { charcoal: '#3a3a42', cream: '#e8d9b3', midnight: '#1a2030', snow: '#e8e8e8', ginger: '#d97a2a', tuxedo: '#151a22' };
    const TOTAL_SECRETS = 9;
    function catBadgeHtml(row) {
      const model = String((row && row.catModel) || 'classic').toLowerCase();
      const emoji = CAT_MODEL_EMOJI[model] || CAT_MODEL_EMOJI.classic;
      const label = CAT_MODEL_LABEL[model] || 'Cat';
      const colorable = model !== 'bababooey' && model !== 'totodile';
      const color = CAT_COLOR_HEX[String((row && row.catColor) || 'ginger').toLowerCase()] || CAT_COLOR_HEX.ginger;
      const dot = colorable ? `<span class="catDot" style="background:${color}"></span>` : '';
      const title = colorable ? `${label} · ${(row && row.catColor) || 'ginger'}` : label;
      return `<span class="catBadge" title="${escapeHtml(title)}"><span class="catEmoji">${emoji}</span>${dot}<span>${label}</span></span>`;
    }

    function secretBadgeHtml(row) {
      const n = Math.max(0, Math.min(TOTAL_SECRETS, Math.floor(Number(row && row.secretCoins) || 0)));
      const cls = n === 0 ? ' is-zero' : (n >= TOTAL_SECRETS ? ' is-max' : '');
      const title = `${n} of ${TOTAL_SECRETS} secret coin${n === 1 ? '' : 's'} found`;
      return `<span class="secretBadge${cls}" title="${escapeHtml(title)}" aria-label="${escapeHtml(title)}"><i class="ph-fill ph-key"></i>${n}/${TOTAL_SECRETS}</span>`;
    }

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    function renderHero({ challenger, time, isTopTime }) {
      if (challenger && time) {
        const eyebrow = isTopTime ? 'Top time on the board' : 'A friend challenged you';
        heroEyebrow.innerHTML = `<i class="ph-fill ph-trophy"></i> ${escapeHtml(eyebrow)}`;
        heroHeadline.innerHTML = `Beat <span class="who">${escapeHtml(challenger)}</span>'s <span class="time">${escapeHtml(time)}</span>`;
      } else {
        heroEyebrow.innerHTML = `<i class="ph-fill ph-trophy"></i> Speedrun Challenge`;
        heroHeadline.textContent = 'How fast can you grab every coin?';
      }
    }

    async function loadLeaderboard() {
      let rows = [];
      try {
        const res = await fetch('/api/leaderboard', { credentials: 'same-origin' });
        const data = await res.json();
        if (!res.ok || data.ok === false) throw new Error((data && data.message) || `API ${res.status}`);
        rows = Array.isArray(data.leaderboard) ? data.leaderboard : [];
        boardMeta.textContent = `Top ${data.maxEntries || 25} · max ${data.perPlayer || 3}/player`;
      } catch (err) {
        rows = [];
        boardMeta.textContent = 'Connection issue';
      }

      // Resolve hero target: the shared entry, falling back to #1.
      let hitRow = null;
      if (hitId) hitRow = rows.find((r) => String(r.id || '') === hitId) || null;
      const heroRow = hitRow || rows[0] || null;
      if (heroRow) {
        renderHero({
          challenger: heroRow.name || 'Someone',
          time: fmtRun(heroRow.timeMs),
          isTopTime: !hitRow && heroRow === rows[0]
        });
      } else {
        renderHero({});
      }

      if (!rows.length) {
        rowsEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      rowsEl.innerHTML = rows.map((r, i) => {
        const rowId = String(r.id || '');
        const hit = hitId && rowId === hitId;
        return `<li class="row${hit ? ' hit' : ''}" data-entry-id="${escapeHtml(rowId)}">
          <div class="rank">#${i + 1}</div>
          <div class="name">${escapeHtml(r.name)}</div>
          ${catBadgeHtml(r)}
          ${secretBadgeHtml(r)}
          <div class="time">${fmtRun(r.timeMs)}</div>
        </li>`;
      }).join('');

      if (hitId) {
        const hitEl = rowsEl.querySelector(`[data-entry-id="${CSS.escape(hitId)}"]`);
        if (hitEl) setTimeout(() => hitEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
      }
    }

    copyBtn.addEventListener('click', async () => {
      const original = copyBtn.innerHTML;
      try {
        await copyText(location.href);
        copyBtn.innerHTML = '<i class="ph ph-check"></i> Copied!';
      } catch (err) {
        copyBtn.innerHTML = '<i class="ph ph-warning"></i> Copy failed';
      }
      setTimeout(() => { copyBtn.innerHTML = original; }, 1400);
    });

    // Skip the live-scene iframe on touch / narrow devices to save battery.
    const bgFrame = document.getElementById('bgFrame');
    const _isCoarse = matchMedia('(pointer: coarse)').matches;
    const _isNarrow = window.innerWidth < 720;
    if (bgFrame && (_isCoarse || _isNarrow)) {
      bgFrame.remove();
    } else if (bgFrame) {
      bgFrame.addEventListener('load', () => bgFrame.classList.add('ready'), { once: true });
      setTimeout(() => bgFrame.classList.add('ready'), 4000);
    }

    loadLeaderboard();
  </script>
</body>
</html>
