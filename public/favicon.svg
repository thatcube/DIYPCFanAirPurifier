<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cat head favicon - dark gray top / white bottom -->
  <!-- Left ear -->
  <polygon points="5,12 8,3 12,10" fill="#4a4a4a"/>
  <polygon points="7,10 8.5,5 10.5,9" fill="#6a6a6a"/>
  <!-- Right ear -->
  <polygon points="20,10 24,3 27,12" fill="#4a4a4a"/>
  <polygon points="21.5,9 23.5,5 25,10" fill="#6a6a6a"/>
  <!-- Head shape - top half dark gray -->
  <ellipse cx="16" cy="17" rx="12" ry="11" fill="#4a4a4a"/>
  <!-- Bottom half white overlay -->
  <clipPath id="bottom">
    <rect x="0" y="17" width="32" height="16"/>
  </clipPath>
  <ellipse cx="16" cy="17" rx="12" ry="11" fill="#f0f0f0" clip-path="url(#bottom)"/>
  <!-- Muzzle bump -->
  <ellipse cx="16" cy="21" rx="5" ry="3.5" fill="#f0f0f0"/>
  <!-- Eyes -->
  <ellipse cx="11.5" cy="16" rx="2.2" ry="2.4" fill="#1a1a1a"/>
  <ellipse cx="20.5" cy="16" rx="2.2" ry="2.4" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="12.3" cy="15.2" r="0.8" fill="#c8e4ff"/>
  <circle cx="21.3" cy="15.2" r="0.8" fill="#c8e4ff"/>
  <!-- Nose -->
  <ellipse cx="16" cy="20" rx="1.2" ry="0.8" fill="#e0888a"/>
  <!-- Mouth -->
  <path d="M14.5,21 Q16,23 17.5,21" fill="none" stroke="#c07070" stroke-width="0.6"/>
  <!-- Whiskers -->
  <line x1="4" y1="19" x2="12" y2="19.5" stroke="#888" stroke-width="0.4"/>
  <line x1="4" y1="21" x2="12" y2="20.5" stroke="#888" stroke-width="0.4"/>
  <line x1="20" y1="19.5" x2="28" y2="19" stroke="#888" stroke-width="0.4"/>
  <line x1="20" y1="20.5" x2="28" y2="21" stroke="#888" stroke-width="0.4"/>
</svg>
