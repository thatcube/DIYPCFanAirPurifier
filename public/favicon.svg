<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pixel cat favicon - 32x32 grid -->
  <rect width="32" height="32" rx="6" fill="#0a0e14"/>
  <!-- Ears -->
  <rect x="7" y="4" width="4" height="4" fill="#ff9500"/>
  <rect x="8" y="3" width="2" height="2" fill="#ff9500"/>
  <rect x="21" y="4" width="4" height="4" fill="#ff9500"/>
  <rect x="22" y="3" width="2" height="2" fill="#ff9500"/>
  <!-- Inner ears -->
  <rect x="9" y="5" width="2" height="2" fill="#ffb347"/>
  <rect x="22" y="5" width="2" height="2" fill="#ffb347"/>
  <!-- Head -->
  <rect x="7" y="7" width="18" height="12" rx="2" fill="#ff9500"/>
  <!-- Face fill -->
  <rect x="9" y="9" width="14" height="8" fill="#ffb347"/>
  <!-- Eyes -->
  <rect x="11" y="10" width="3" height="3" rx="1" fill="#0a0e14"/>
  <rect x="18" y="10" width="3" height="3" rx="1" fill="#0a0e14"/>
  <!-- Eye shine -->
  <rect x="12" y="10" width="1" height="1" fill="#91deff"/>
  <rect x="19" y="10" width="1" height="1" fill="#91deff"/>
  <!-- Nose -->
  <rect x="15" y="13" width="2" height="1" rx="0.5" fill="#e8785a"/>
  <!-- Mouth -->
  <rect x="14" y="14" width="1" height="1" fill="#e8785a"/>
  <rect x="17" y="14" width="1" height="1" fill="#e8785a"/>
  <!-- Body -->
  <rect x="9" y="19" width="14" height="7" rx="2" fill="#ff9500"/>
  <!-- Paws -->
  <rect x="9" y="25" width="4" height="3" rx="1" fill="#ffb347"/>
  <rect x="19" y="25" width="4" height="3" rx="1" fill="#ffb347"/>
  <!-- Tail -->
  <rect x="23" y="20" width="3" height="2" rx="1" fill="#ff9500"/>
  <rect x="25" y="18" width="2" height="3" rx="1" fill="#ff9500"/>
  <rect x="26" y="17" width="2" height="2" rx="1" fill="#ffb347"/>
</svg>
