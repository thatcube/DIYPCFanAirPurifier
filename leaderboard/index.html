<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zoomies Leaderboard</title>
  <style>
    :root {
      --bg0: #07121d;
      --bg1: #122637;
      --card: rgba(6, 14, 24, 0.82);
      --edge: rgba(128, 197, 243, 0.35);
      --text: #e6f3ff;
      --muted: #a8c0d6;
      --accent: #9fe3ff;
      --gold: #ffd873;
      --goldEdge: rgba(255, 216, 115, 0.45);
      --font-ui: "Nunito Sans Variable", "Nunito Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
      --tracking-base: 0.01em;
      --tracking-wide: 0.045em;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text);
      line-height: 1.45;
      letter-spacing: var(--tracking-base);
      text-rendering: optimizeLegibility;
      /* Fallback gradient sits behind the iframe in case it fails to load */
      background: radial-gradient(1200px 700px at 18% -12%, #244868 0%, transparent 58%),
        radial-gradient(900px 560px at 110% 10%, #1f3e56 0%, transparent 65%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      padding: 18px;
      position: relative;
      overflow-x: hidden;
    }

    /* Live game scene rendered behind the leaderboard */
    #bgFrame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      z-index: -2;
      pointer-events: none;
      filter: saturate(1.05);
      opacity: 0;
    }

    #bgFrame.ready {
      opacity: 1;
    }

    /* Dark scrim so leaderboard text stays legible over the live scene */
    #bgScrim {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(120% 80% at 50% 30%, rgba(7, 18, 29, 0.35) 0%, rgba(7, 18, 29, 0.7) 70%, rgba(7, 18, 29, 0.88) 100%);
      backdrop-filter: blur(2px) saturate(1.05);
      -webkit-backdrop-filter: blur(2px) saturate(1.05);
    }

    @media (prefers-reduced-motion: reduce) {
      #bgFrame {
        display: none;
      }
    }

    .wrap {
      width: min(960px, 100%);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 16px;
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .head {
      padding: 16px 16px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 30px);
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--accent);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--edge);
      background: rgba(13, 34, 48, 0.72);
      color: #d9f5ff;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.2;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    /* Big, obvious green Play CTA */
    .btn--play {
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #052016;
      background: linear-gradient(180deg, #b6ffd4 0%, #6fe8a3 55%, #3ed089 100%);
      border: 1px solid rgba(220, 255, 230, 0.85);
      border-radius: 12px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      box-shadow:
        0 0 0 1px rgba(180, 255, 210, 0.6) inset,
        0 10px 28px rgba(80, 220, 140, 0.45),
        0 0 36px rgba(120, 240, 170, 0.4);
      animation: playPulse 2.2s ease-in-out infinite;
    }

    .btn--play::before {
      content: "▶";
      font-size: 11px;
      line-height: 1;
      display: inline-block;
      transform: translateY(-1px);
    }

    .btn--play:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 0 0 1px rgba(220, 255, 235, 0.9) inset,
        0 14px 36px rgba(80, 220, 140, 0.55),
        0 0 48px rgba(120, 240, 170, 0.5);
    }

    .btn--play:active {
      transform: translateY(0);
    }

    .btn--play:focus-visible {
      outline: 2px solid rgba(220, 255, 235, 0.95);
      outline-offset: 3px;
    }

    @keyframes playPulse {

      0%,
      100% {
        box-shadow:
          0 0 0 1px rgba(180, 255, 210, 0.6) inset,
          0 10px 28px rgba(80, 220, 140, 0.45),
          0 0 36px rgba(120, 240, 170, 0.4);
      }

      50% {
        box-shadow:
          0 0 0 1px rgba(200, 255, 220, 0.8) inset,
          0 12px 34px rgba(80, 220, 140, 0.6),
          0 0 56px rgba(120, 240, 170, 0.6);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn--play {
        animation: none;
      }
    }

    .meta {
      padding: 11px 16px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 10px;
      display: grid;
      gap: 7px;
    }

    .row {
      display: grid;
      grid-template-columns: 48px 1fr auto auto;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      padding: 9px 11px;
      font-size: 13px;
      line-height: 1.35;
      scroll-margin-top: 22px;
    }

    .rank {
      color: var(--muted);
      font-weight: 600;
    }

    .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .catBadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 2px 8px 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cdd7e5;
      white-space: nowrap;
    }

    .catBadge .catEmoji {
      font-size: 13px;
      line-height: 1;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.35));
    }

    .catBadge .catDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.45);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
    }

    .row.hit .catBadge {
      background: rgba(255, 216, 115, 0.1);
      border-color: rgba(255, 216, 115, 0.3);
      color: #ffeab2;
    }

    .time {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .row.hit {
      background: rgba(255, 216, 115, 0.14);
      border-color: var(--goldEdge);
      box-shadow: 0 0 0 2px rgba(255, 216, 115, 0.2) inset;
    }

    .row.hit .time,
    .row.hit .name {
      color: var(--gold);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .head {
        padding: 13px 12px 9px;
      }

      .meta {
        padding: 10px 12px;
      }

      .list {
        padding: 8px;
      }

      .row {
        grid-template-columns: 42px 1fr auto auto;
        padding: 8px 9px;
      }

      .right {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <iframe id="bgFrame" src="/play?bg=1" title="" aria-hidden="true" tabindex="-1" referrerpolicy="same-origin"></iframe>
  <div id="bgScrim" aria-hidden="true">
    <div class="bg-grid"></div>
  </div>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>Leaderboard</h1>
        <p class="sub">Zoomies</p>
      </div>
      <div class="right">
        <button id="copyLinkBtn" class="btn" type="button">Copy link</button>
        <a class="btn btn--play" href="/play">Play</a>
      </div>
    </div>
    <div id="meta" class="meta">Loading...</div>
    <ol id="rows" class="list" aria-live="polite"></ol>
    <div id="empty" class="empty" style="display:none">No runs yet. Be the first to post a time.</div>
  </main>

  <script>
    const rowsEl = document.getElementById('rows');
    const metaEl = document.getElementById('meta');
    const emptyEl = document.getElementById('empty');
    const copyBtn = document.getElementById('copyLinkBtn');
    const query = new URLSearchParams(location.search);
    const hitId = query.get('entry') || '';
    const _queryTimeRaw = query.get('timeMs') || query.get('time') || '';
    const _queryTimeMsNum = Math.floor(Number(_queryTimeRaw));
    const queryTimeMs = Number.isFinite(_queryTimeMsNum) && _queryTimeMsNum > 0 ? _queryTimeMsNum : 0;

    function escapeHtml(v) {
      return String(v || '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function fmtRun(ms) {
      const total = Math.max(0, Math.floor(Number(ms) || 0));
      const m = Math.floor(total / 60000);
      const s = Math.floor((total % 60000) / 1000);
      const z = total % 1000;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(z).padStart(3, '0')}`;
    }

    // Cat model → emoji/label. Kept in sync with index.html's _CAT_MODEL_EMOJI.
    const CAT_MODEL_EMOJI = { classic: '🐱', toon: '🦁', bababooey: '🐿️', totodile: '🐊', korra: '🐈' };
    const CAT_MODEL_LABEL = { classic: 'Classic', toon: 'Toon', bababooey: 'Bababooey', totodile: 'Totodile', korra: 'Cursed Korra' };
    function catBadgeHtml(row) {
      const model = String((row && row.catModel) || 'classic').toLowerCase();
      const emoji = CAT_MODEL_EMOJI[model] || CAT_MODEL_EMOJI.classic;
      const label = CAT_MODEL_LABEL[model] || 'Cat';
      return `<span class="catBadge" title="${escapeHtml(label)}"><span class="catEmoji">${emoji}</span><span>${label}</span></span>`;
    }

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    async function loadLeaderboard() {
      try {
        const res = await fetch('/api/leaderboard', { credentials: 'same-origin' });
        const data = await res.json();
        if (!res.ok || data.ok === false) throw new Error((data && data.message) || `API ${res.status}`);

        const rows = Array.isArray(data.leaderboard) ? data.leaderboard : [];
        if (!rows.length) {
          rowsEl.innerHTML = '';
          emptyEl.style.display = 'block';
          metaEl.textContent = queryTimeMs
            ? `Shared leaderboard is live. No runs yet. Your time: ${fmtRun(queryTimeMs)}`
            : 'Shared leaderboard is live. No runs yet.';
          return;
        }

        rowsEl.innerHTML = rows.map((r, i) => {
          const rowId = String(r.id || '');
          const hit = hitId && rowId === hitId;
          return `<li class="row${hit ? ' hit' : ''}" data-entry-id="${escapeHtml(rowId)}">
            <div class="rank">#${i + 1}</div>
            <div class="name">${escapeHtml(r.name)}</div>
            ${catBadgeHtml(r)}
            <div class="time">${fmtRun(r.timeMs)}</div>
          </li>`;
        }).join('');

        emptyEl.style.display = 'none';
        metaEl.textContent = queryTimeMs
          ? `Fastest first | Top ${data.maxEntries || 25} | Max ${data.perPlayer || 3} per player | Your time ${fmtRun(queryTimeMs)}`
          : `Fastest first | Top ${data.maxEntries || 25} | Max ${data.perPlayer || 3} per player`;

        if (hitId) {
          const allRows = rowsEl.querySelectorAll('[data-entry-id]');
          let hitEl = null;
          for (const rowEl of allRows) {
            if (rowEl.getAttribute('data-entry-id') === hitId) {
              hitEl = rowEl;
              break;
            }
          }
          if (hitEl) {
            setTimeout(() => hitEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
          }
        }
      } catch (err) {
        rowsEl.innerHTML = '';
        emptyEl.style.display = 'block';
        emptyEl.textContent = 'Could not load leaderboard right now.';
        metaEl.textContent = 'Connection issue';
      }
    }

    copyBtn.addEventListener('click', async () => {
      try {
        await copyText(location.href);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy link'; }, 1200);
      } catch (err) {
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => { copyBtn.textContent = 'Copy link'; }, 1400);
      }
    });

    // Fade in the background scene once it loads (or skip on small/mobile devices to save battery)
    const bgFrame = document.getElementById('bgFrame');
    const _isCoarse = matchMedia('(pointer: coarse)').matches;
    const _isNarrow = window.innerWidth < 720;
    if (bgFrame && (_isCoarse || _isNarrow)) {
      bgFrame.remove();
    } else if (bgFrame) {
      // Wait for the iframe to postMessage that its first scene frame
      // actually composited — not just iframe.load (which fires while
      // three.js is still booting and the canvas is empty, leaving
      // glass cards blurring a flat body color = no visible blur).
      function _bgReady() { bgFrame.classList.add('ready'); }
      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        if (e.data && e.data.type === 'bg-scene-ready') _bgReady();
      });
      // Safety fade-in if the message never arrives
      setTimeout(_bgReady, 4000);
    }

    loadLeaderboard();
  </script>
</body>

</html>
