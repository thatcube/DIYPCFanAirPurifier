<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DIY PC Fan Air Purifier</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <div id="loading">Loading...</div>
  <canvas id="c"></canvas>
  <div id="fps"></div>

  <!-- Control Panel -->
  <button class="panel-fab" id="panelFab" onclick="document.getElementById('panelL').style.display='flex';this.style.display='none'">☰</button>
  <div class="panel panel-l" id="panelL">
    <div class="panel-header">
      <h3>Control Center</h3>
      <button class="panel-close" onclick="this.closest('.panel').style.display='none';document.getElementById('panelFab').style.display='flex'">✕</button>
    </div>
    <div class="panel-scroll">

      <!-- Structure -->
      <div class="section-group">
        <h4>Structure</h4>
        <div class="ctrl-row"><label>Fan layout</label>
          <div class="seg">
            <button class="on" id="btnLayoutFB" onclick="window._setLayout&&window._setLayout('fb')">Front+Back</button>
            <button id="btnLayoutFT" onclick="window._setLayout&&window._setLayout('ft')">Front+Top</button>
          </div>
        </div>
        <div class="ctrl-row"><label>Fans per panel</label>
          <div class="seg">
            <button id="btnFan3" onclick="window._setFanCount&&window._setFanCount(3)">3</button>
            <button class="on" id="btnFan4" onclick="window._setFanCount&&window._setFanCount(4)">4</button>
          </div>
        </div>
        <div class="ctrl-row"><label>Edge profile</label>
          <div class="seg">
            <button class="on" id="btnEdgeFlat" onclick="window._setEdge&&window._setEdge('flat')">Flat</button>
            <button id="btnEdgeCurved" onclick="window._setEdge&&window._setEdge('curved')">Curved</button>
          </div>
        </div>
        <div class="ctrl-row"><label>Wood stain</label>
          <div class="seg">
            <button class="on" id="btnStainRaw" onclick="window._setStain&&window._setStain('raw')">Raw</button>
            <button id="btnStainOil" onclick="window._setStain&&window._setStain('oil')">Oil</button>
            <button id="btnStainWalnut" onclick="window._setStain&&window._setStain('walnut')">Walnut</button>
          </div>
        </div>
        <div class="ctrl-row"><label>Exploded view</label>
          <div class="toggle-sw" id="togExplode" onclick="window._toggleExplode&&window._toggleExplode()"></div>
        </div>
      </div>

      <!-- Finish & Feet -->
      <div class="section-group">
        <h4>Finish & Feet</h4>
        <div class="ctrl-row"><label>Show filters</label>
          <div class="toggle-sw on" id="togFilter" onclick="window._toggleFilter&&window._toggleFilter()"></div>
        </div>
        <div class="ctrl-row"><label>Fan grills</label>
          <div class="toggle-sw on" id="togGrill" onclick="window._toggleGrills&&window._toggleGrills()"></div>
        </div>
        <div class="ctrl-row" id="grillColorSection"><label>Grill color</label>
          <div class="seg">
            <button class="on" id="btnGrillBlack" onclick="window._setGrillColor&&window._setGrillColor('black')">Black</button>
            <button id="btnGrillSilver" onclick="window._setGrillColor&&window._setGrillColor('silver')">Silver</button>
          </div>
        </div>
        <div class="ctrl-row"><label>Feet style</label>
          <div class="seg">
            <button id="btnFeetPeg" onclick="window._setFeet&&window._setFeet('peg')">Peg</button>
            <button class="on" id="btnFeetBun" onclick="window._setFeet&&window._setFeet('bun')">Bun</button>
            <button id="btnFeetRubber" onclick="window._setFeet&&window._setFeet('rubber')">Rubber</button>
            <button id="btnFeetNone" onclick="window._setFeet&&window._setFeet('none')">None</button>
          </div>
        </div>
      </div>

      <!-- Placement -->
      <div class="section-group">
        <h4>Placement</h4>
        <div class="ctrl-row"><label>Position</label>
          <div class="seg">
            <button id="btnPlaceFloor" onclick="window._setPlacement&&window._setPlacement('floor')">Floor</button>
            <button class="on" id="btnPlaceTv" onclick="window._setPlacement&&window._setPlacement('tv')">Under TV</button>
            <button id="btnPlaceWall" onclick="window._setPlacement&&window._setPlacement('wall')">Wall</button>
          </div>
        </div>
        <div class="slider-row">
          <label>Turntable</label>
          <input type="range" min="0" max="360" value="90" id="turntableSlider" oninput="window._setTurntable&&window._setTurntable(this.value);document.getElementById('turntableLabel').textContent=this.value+'°'">
          <span id="turntableLabel">90°</span>
        </div>
      </div>

      <!-- Fans -->
      <div class="section-group">
        <h4>Fans</h4>
        <div class="ctrl-row"><label>Spin fans</label>
          <div class="toggle-sw on" id="togSpin" onclick="window._toggleSpin&&window._toggleSpin()"></div>
        </div>
        <div class="slider-row">
          <label>Speed</label>
          <input type="range" min="0" max="1800" value="900" id="fanSpeedSlider" oninput="window._setFanSpeed&&window._setFanSpeed(this.value);document.getElementById('fanSpeedVal').textContent=this.value+'rpm'">
          <span id="fanSpeedVal">900rpm</span>
        </div>
        <div class="ctrl-row"><label>Show airflow</label>
          <div class="toggle-sw" id="togAirflow" onclick="window._toggleAirflow&&window._toggleAirflow()"></div>
        </div>
        <div class="ctrl-row"><label>Fan color</label>
          <div class="seg">
            <button class="on" id="btnFanWhite" onclick="window._setFanColor&&window._setFanColor('white')">White</button>
            <button id="btnFanBlack" onclick="window._setFanColor&&window._setFanColor('black')">Black</button>
          </div>
        </div>
        <div class="ctrl-row"><label>RGB Fans</label>
          <div class="toggle-sw" id="togRGB" onclick="window._toggleRGB&&window._toggleRGB()"></div>
        </div>
      </div>

      <!-- Scene -->
      <div class="section-group">
        <h4>Scene</h4>
        <div class="slider-row">
          <label>Time</label>
          <input type="range" min="0" max="1439" value="870" id="todSlider" oninput="window._setTOD&&window._setTOD(this.value)">
          <span id="todLabel">2:30 PM</span>
        </div>
        <div class="ctrl-row"><label>Isolate purifier</label>
          <div class="toggle-sw" id="togIsolate" onclick="window._toggleIsolate&&window._toggleIsolate()"></div>
        </div>
        <div class="ctrl-row"><label>Dimensions</label>
          <div class="toggle-sw" id="togDims" onclick="window._toggleDims&&window._toggleDims()"></div>
        </div>
        <div class="ctrl-row"><label>Show FPS</label>
          <div class="toggle-sw on" id="togFps" onclick="window._toggleFps&&window._toggleFps()"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Part tooltip (hover over purifier parts) -->
  <div class="part-tooltip" id="partTooltip">
    <div class="tip-name" id="tipName"></div>
    <div class="tip-dims" id="tipDims"></div>
  </div>

  <!-- Game mode -->
  <button id="playDockBtn" onclick="window._openCharSelect&&window._openCharSelect()">▶ Play Mode <kbd class="key-hint">G</kbd></button>

  <!-- Character Select (Smash Bros style) -->
  <div id="charSelect">
    <div class="char-select-inner">
      <h2>Choose Your Cat</h2>
      <div class="char-grid">
        <div class="char-card selected" data-model="classic" onclick="window._selectCat&&window._selectCat('classic',this)">
          <canvas class="char-preview" id="previewClassic"></canvas>
          <div class="char-name">Classic</div>
          <div class="char-colors" id="classicColors">
            <button class="color-dot on" data-color="charcoal" style="background:#0a0a12" onclick="event.stopPropagation();window._selectColor&&window._selectColor('charcoal',this)"></button>
            <button class="color-dot" data-color="cream" style="background:#B08030" onclick="event.stopPropagation();window._selectColor&&window._selectColor('cream',this)"></button>
            <button class="color-dot" data-color="midnight" style="background:#040818" onclick="event.stopPropagation();window._selectColor&&window._selectColor('midnight',this)"></button>
            <button class="color-dot" data-color="snow" style="background:#d8d8d8" onclick="event.stopPropagation();window._selectColor&&window._selectColor('snow',this)"></button>
          </div>
        </div>
        <div class="char-card" data-model="toon" onclick="window._selectCat&&window._selectCat('toon',this)">
          <canvas class="char-preview" id="previewToon"></canvas>
          <div class="char-name">Toon</div>
          <div class="char-sub">Orange tabby</div>
        </div>
        <div class="char-card" data-model="bababooey" onclick="window._selectCat&&window._selectCat('bababooey',this)">
          <canvas class="char-preview" id="previewBababooey"></canvas>
          <div class="char-name">Bababooey</div>
          <div class="char-sub">Cursed energy</div>
        </div>
      </div>
      <button class="char-start" onclick="window._startGame&&window._startGame()">START RUN</button>
    </div>
  </div>

  <!-- FP HUD -->
  <div id="fpHud">
    <div id="coinHud">🪙 <span id="coinCount">0/0</span></div>
    <div id="runTimerHud"><span id="runTimerText">0:00.0</span> <span id="runTimerState"></span></div>
  </div>
  <div id="fpCrosshair"></div>
  <div id="fpControls">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move · <kbd>Space</kbd> Jump (hold)<br>
    <kbd>Shift</kbd> Sprint · <kbd>V</kbd> Camera · <kbd>G</kbd> Exit · <kbd>Esc</kbd> Pause
  </div>
  <div id="fpChargeBar"><div id="fpChargeFill"></div></div>

  <!-- Leaderboard (in-game) -->
  <div id="fpLeaderboard">
    <h4>Leaderboard</h4>
    <ol id="fpLeaderboardList"></ol>
  </div>

  <!-- Pause overlay -->
  <div id="fpPauseOverlay">
    <h2>Paused</h2>
    <button onclick="window._resumeFP&&window._resumeFP()">Resume</button>
    <button onclick="window._resetFP&&window._resetFP()">Reset Run</button>
    <button onclick="window._exitFP&&window._exitFP()">Exit Game</button>
  </div>

  <!-- Mobile controls -->
  <div id="mobilePad">
    <div id="mobileJoystick">
      <div id="mobileJoyKnob"></div>
    </div>
  </div>
  <button id="mobileJumpBtn" ontouchstart="window._mobileJump&&window._mobileJump(true)" ontouchend="window._mobileJump&&window._mobileJump(false)">⬆</button>
  <button id="mobileExitBtn" onclick="window._exitFP&&window._exitFP()">✕</button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
