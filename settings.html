<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings — Zoomies</title>
  <meta name="description"
    content="Tune visuals, audio, and controls for Zoomies. Settings save instantly to this device." />
  <link rel="stylesheet" href="./src/styles/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <style>
    /* Settings page-local styles. The schema-driven panel inside is
       a sibling of about/leaderboard's .hero — same liquid glass
       material, same outer entrance, different content shape. */
    :root {
      --bg0: #07121d;
      --bg1: #122637;
      --muted: #a8c0d6;
      --pg-accent: #9fe3ff;
      --pg-warm: #ffd9b8;
    }

    * {
      box-sizing: border-box;
    }

    /* main.css locks html/body to overflow:hidden;height:100% for the
       3D game; override here so the settings page scrolls when content
       overflows. !important: see leaderboard.html / about.html for the
       same pattern — Vite moves main.css to the end of <head> so the
       overflow lock wins source-order on direct load. */
    html,
    body {
      height: auto !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text);
      font-weight: var(--weight-regular);
      line-height: 1.55;
      text-rendering: optimizeLegibility;
      background: radial-gradient(1200px 700px at 18% -12%, #244868 0%, transparent 58%),
        radial-gradient(900px 560px at 110% 10%, #1f3e56 0%, transparent 65%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      padding: 92px 18px 48px;
      position: relative;
      z-index: 0;
    }

    /* Live game scene rendered behind the page (mirrors about.html). */
    #bgFrame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.05);
      opacity: 0;
    }

    #bgFrame.ready {
      opacity: 1;
    }

    #bgScrim {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(8, 10, 16, 0.55) 0%, rgba(8, 10, 16, 0) 55%),
        radial-gradient(120% 80% at 50% 100%, rgba(8, 10, 16, 0.6) 0%, rgba(8, 10, 16, 0) 55%);
      backdrop-filter: blur(2px) saturate(1.1);
      -webkit-backdrop-filter: blur(2px) saturate(1.1);
    }

    /* Iframe-promotion mode (mirrors home.html / about.html). */
    body.is-playing #bgFrame {
      pointer-events: auto;
      z-index: 2;
    }

    @media (prefers-reduced-motion: reduce) {
      #bgFrame {
        display: none;
      }
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    /* Outer settings card — same liquid-glass surface as .hero on
       /about and the share-page leaderboard, so the whole site reads
       as one continuous glass material. */
    .settings-card {
      position: relative;
      background-color: var(--glass);
      background-image: var(--glass-specular);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 32px 0 rgba(255, 255, 255, 0.03),
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 1px 0 rgba(0, 0, 0, 0.5);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      padding: 26px 24px 22px;
      isolation: isolate;
    }

    .settings-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 6%;
      right: 6%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.7) 50%, transparent 100%);
      border-radius: 32px 32px 0 0;
      pointer-events: none;
    }

    .settings-card__head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 0 0 14px;
    }

    .settings-card__title {
      margin: 0;
      font-size: 22px;
      font-weight: var(--weight-bold);
      letter-spacing: 0.005em;
      color: rgba(232, 244, 255, 0.98);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .settings-card__title i {
      font-size: 20px;
      color: var(--pg-accent);
    }

    .settings-card__sub {
      margin: 0;
      font-size: 12px;
      color: rgba(220, 235, 250, 0.66);
    }

    @media (max-width: 640px) {
      body {
        padding: 78px 12px 36px;
      }

      .settings-card {
        padding: 22px 16px 18px;
        border-radius: 26px;
      }
    }
  </style>
</head>

<body>
  <iframe id="bgFrame" src="/play?bg=1" title="" aria-hidden="true" tabindex="-1" referrerpolicy="same-origin"></iframe>
  <div id="bgScrim" aria-hidden="true">
    <div class="bg-grid"></div>
  </div>

  <nav class="site-tabs" aria-label="Primary">
    <a class="site-tab" href="/" data-tab="home">
      <i class="site-tab__icon site-tab__icon--regular ph ph-house"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-house"></i><span>Home</span>
    </a>
    <a class="site-tab" href="/leaderboard" data-tab="leaderboard">
      <i class="site-tab__icon site-tab__icon--regular ph ph-trophy"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-trophy"></i><span>Leaderboard</span>
    </a>
    <a class="site-tab" href="/about" data-tab="about">
      <i class="site-tab__icon site-tab__icon--regular ph ph-info"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-info"></i><span>About</span>
    </a>
    <a class="site-tab" href="/settings" data-tab="settings">
      <i class="site-tab__icon site-tab__icon--regular ph ph-gear"></i><i
        class="site-tab__icon site-tab__icon--fill ph-fill ph-gear"></i><span>Settings</span>
    </a>
  </nav>

  <main class="page" data-view="settings">
    <section class="settings-card">
      <header class="settings-card__head">
        <h1 class="settings-card__title">
          <i class="ph ph-gear" aria-hidden="true"></i>
          Settings
        </h1>
      </header>
      <p class="settings-card__sub">Tune visuals, audio, and controls. Changes save to this device instantly.</p>
      <div id="settingsHost"></div>
    </section>
  </main>

  <!-- Mount the schema-driven settings panel into the host on direct
       page load. SPA navigation into /settings is handled separately
       by the shell router's view-mount hook (see swap() in home.html
       / about.html / leaderboard.html) — we don't rely on script
       re-injection because Vite bundles inline modules to external
       chunks at build time, and module URLs only execute once per
       browsing context. -->
  <script type="module">
    import { mountSettings } from '/src/modules/settings-panel.js';
    const host = document.getElementById('settingsHost');
    if (host) mountSettings(host);
  </script>

  <script>
    // Iframe-reveal — same pattern as about.html. Skipped on coarse /
    // narrow viewports to save battery.
    const bgFrame = document.getElementById('bgFrame');
    const _isCoarse = matchMedia('(pointer: coarse)').matches;
    const _isNarrow = window.innerWidth < 720;

    let _tabsRevealed = false;
    function _revealTabs() {
      if (_tabsRevealed) return;
      _tabsRevealed = true;
      document.body.classList.add('tabs-revealed');
    }

    if (bgFrame && (_isCoarse || _isNarrow)) {
      bgFrame.remove();
      setTimeout(_revealTabs, 1100);
    } else if (bgFrame) {
      function _bgReady() {
        bgFrame.classList.add('ready');
        bgFrame.setAttribute('data-scene-ready', '1');
        if (typeof window.__flushPendingPlay === 'function') window.__flushPendingPlay();
        setTimeout(_revealTabs, 520);
      }
      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        if (e.data && e.data.type === 'bg-scene-ready') _bgReady();
      });
      setTimeout(_bgReady, 4000);
    } else {
      setTimeout(_revealTabs, 1100);
    }
  </script>

  <script>
    // Shared SPA router — same copy that lives in home.html /
    // leaderboard.html / about.html. Adds the 'settings' case so
    // /settings ↔ /home ↔ /leaderboard ↔ /about all SPA-swap with
    // the iframe preserved.
    (function () {
      const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

      function viewFor(path) {
        path = path.replace(/\/+$/, '') || '/';
        if (path === '/' || path === '/home' || path === '/home.html') return 'home';
        if (path === '/about' || path === '/about.html') return 'about';
        if (path === '/leaderboard' || path === '/leaderboard.html' || path.startsWith('/leaderboard')) return 'leaderboard';
        if (path === '/settings' || path === '/settings.html') return 'settings';
        if (path === '/play' || path === '/vite-index.html' || path === '/index.html') return 'play';
        return null;
      }

      function setActiveTab(view) {
        document.querySelectorAll('.site-tabs .site-tab').forEach(t => {
          const id = t.getAttribute('data-tab');
          const active = id === view;
          t.classList.toggle('is-active', active);
          if (active) t.setAttribute('aria-current', 'page');
          else t.removeAttribute('aria-current');
        });
        updatePill();
      }

      function buildPill() {
        const nav = document.querySelector('.site-tabs');
        if (!nav || nav.querySelector('.site-tabs-pill')) return;
        const pill = document.createElement('div');
        pill.className = 'site-tabs-pill';
        pill.setAttribute('aria-hidden', 'true');
        nav.insertBefore(pill, nav.firstChild);
        nav.classList.add('has-pill');
      }

      function updatePill() {
        const nav = document.querySelector('.site-tabs');
        const pill = nav && nav.querySelector('.site-tabs-pill');
        const active = nav && nav.querySelector('.site-tab.is-active');
        if (!nav || !pill || !active) return;
        const navRect = nav.getBoundingClientRect();
        const tabRect = active.getBoundingClientRect();
        const left = tabRect.left - navRect.left;
        pill.style.transform = `translateX(${left}px)`;
        pill.style.width = `${tabRect.width}px`;
      }

      (function tagInitial() {
        const v = viewFor(location.pathname);
        if (!v || v === 'play') return;
        document.querySelectorAll('head > style').forEach(s => {
          if (!s.dataset.view) s.dataset.view = v;
        });
        const main = document.querySelector('main.page');
        if (main && !main.dataset.view) main.dataset.view = v;
      })();
      buildPill();
      setActiveTab(viewFor(location.pathname));
      requestAnimationFrame(() => {
        const nav = document.querySelector('.site-tabs');
        if (nav) nav.classList.add('pill-ready');
      });
      window.addEventListener('resize', updatePill);
      if (typeof ResizeObserver !== 'undefined') {
        const nav = document.querySelector('.site-tabs');
        if (nav) {
          const ro = new ResizeObserver(() => updatePill());
          nav.querySelectorAll('.site-tab').forEach(t => ro.observe(t));
        }
      }
      window.addEventListener('load', updatePill);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(updatePill).catch(() => { });
      }

      function fullNav(href) {
        if (reduced) { location.href = href; return; }
        document.body.classList.add('page-fade', 'is-leaving');
        setTimeout(() => { location.href = href; }, 160);
      }

      // Tab order drives slide direction. Going from an earlier tab
      // to a later one (e.g. home → leaderboard) slides forward; the
      // reverse slides back.
      const TAB_ORDER = ['home', 'leaderboard', 'about', 'settings'];

      async function swap(href) {
        const targetView = viewFor(href);
        if (!targetView || targetView === 'play') { fullNav(href); return; }

        const oldMain = document.querySelector('main.page');

        // Read the source view from the current main's data-view
        // rather than location.pathname — popstate calls swap() AFTER
        // the URL has already moved.
        const fromView = oldMain ? oldMain.dataset.view : null;
        const fi = TAB_ORDER.indexOf(fromView);
        const ti = TAB_ORDER.indexOf(targetView);
        const direction = (fi < 0 || ti < 0 || ti >= fi) ? 'forward' : 'back';

        const fetchPromise = fetch(href, { credentials: 'same-origin' }).then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        });

        if (oldMain && !reduced) {
          oldMain.dataset.direction = direction;
          oldMain.classList.add('is-leaving');
        }
        const exitWait = reduced ? 0 : 260;

        let html;
        try {
          html = await fetchPromise;
        } catch (e) {
          location.href = href;
          return;
        }
        if (exitWait) await new Promise(r => setTimeout(r, exitWait));

        const doc = new DOMParser().parseFromString(html, 'text/html');
        document.title = doc.title || document.title;

        document.querySelectorAll('head > style[data-view]').forEach(s => s.remove());
        doc.querySelectorAll('head > style').forEach(s => {
          const clone = s.cloneNode(true);
          clone.dataset.view = targetView;
          document.head.appendChild(clone);
        });

        const newMain = doc.querySelector('main.page');
        const currentOldMain = document.querySelector('main.page');
        if (newMain && currentOldMain) {
          newMain.dataset.view = targetView;
          newMain.dataset.spa = '1';
          // Short translate-only entry — see comment in home.html.
          if (!reduced) {
            newMain.dataset.direction = direction;
            newMain.classList.add('is-entering');
          }
          currentOldMain.replaceWith(newMain);
          if (!reduced) {
            void newMain.offsetWidth;
            requestAnimationFrame(() => newMain.classList.remove('is-entering'));
          }
        }

        history.pushState({ view: targetView }, '', href);
        setActiveTab(targetView);

        // Re-execute any <script data-spa-init> blocks from the swapped
        // page. DOMParser leaves them inert and cloneNode() of a script
        // doesn't execute, so we recreate fresh <script> nodes. The
        // leaderboard's view-init script lives behind this marker and
        // self-invokes its __initLeaderboard at the tail.
        doc.querySelectorAll('script[data-spa-init]').forEach((oldScript) => {
          const fresh = document.createElement('script');
          for (const attr of oldScript.attributes) fresh.setAttribute(attr.name, attr.value);
          fresh.textContent = oldScript.textContent;
          document.body.appendChild(fresh);
        });

        // Settings page: Vite bundles inline <script type="module">
        // blocks to external chunks at build time, and modules only
        // execute once per URL. So we can't rely on re-injecting the
        // page's own mount script — explicitly mount here on swap-in.
        if (targetView === 'settings') {
          import('/src/modules/settings-panel.js').then(({ mountSettings }) => {
            const host = document.getElementById('settingsHost');
            if (host) mountSettings(host);
          });
        }

        window.scrollTo(0, 0);
      }

      document.addEventListener('click', (e) => {
        const a = e.target.closest && e.target.closest('a[href]');
        if (!a) return;
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
        if (a.target && a.target !== '_self') return;

        let url;
        try { url = new URL(a.href, location.href); }
        catch { return; }
        if (url.origin !== location.origin) return;

        if (a.classList.contains('site-tab')) {
          const targetView = viewFor(url.pathname);
          const currentView = viewFor(location.pathname);
          if (a.classList.contains('is-active')) { e.preventDefault(); return; }
          if (targetView && targetView !== 'play' && currentView && currentView !== 'play') {
            e.preventDefault();
            swap(url.pathname + url.search + url.hash);
          } else {
            e.preventDefault();
            fullNav(a.href);
          }
          return;
        }

        if (a.hasAttribute('data-spa-link')) {
          const targetView = viewFor(url.pathname);
          const currentView = viewFor(location.pathname);
          if (targetView && targetView !== 'play' && currentView && currentView !== 'play') {
            e.preventDefault();
            swap(url.pathname + url.search + url.hash);
            return;
          }
        }

        if (a.hasAttribute('data-play-cta')) {
          e.preventDefault();
          promoteToPlay(a.href);
        }
      });

      // Iframe promotion (mirrors home.html / about.html / leaderboard.html).
      const bgFrameForPromote = document.getElementById('bgFrame');

      let _pendingPlay = false;
      function _sendEnterPlay() {
        if (!bgFrameForPromote || !bgFrameForPromote.contentWindow) return;
        try { bgFrameForPromote.contentWindow.postMessage({ type: 'enter-play' }, location.origin); } catch (e) { }
        try { bgFrameForPromote.contentWindow.focus(); } catch (e) { }
      }
      window.__flushPendingPlay = function () {
        if (!_pendingPlay) return;
        _pendingPlay = false;
        _sendEnterPlay();
      };
      function _enterPlayWhenReady() {
        if (bgFrameForPromote && bgFrameForPromote.getAttribute('data-scene-ready') === '1') {
          _sendEnterPlay();
        } else {
          _pendingPlay = true;
        }
      }

      function promoteToPlay(href) {
        window.__playReturnPath = location.pathname + location.search + location.hash;
        if (reduced) {
          history.pushState({ view: 'play' }, '', href || '/play');
          document.body.classList.add('is-playing');
          _enterPlayWhenReady();
          setActiveTab('play');
          return;
        }
        document.body.classList.add('page-fade', 'is-leaving');
        history.pushState({ view: 'play' }, '', href || '/play');
        setActiveTab('play');
        setTimeout(() => {
          document.body.classList.add('is-playing');
          _enterPlayWhenReady();
        }, 850);
      }

      function demoteFromPlay({ updateHistory = true } = {}) {
        const ret = window.__playReturnPath || '/settings';
        const retView = viewFor(ret) || 'settings';
        if (updateHistory) {
          history.pushState({ view: retView }, '', ret);
        }
        setActiveTab(retView);
        document.body.classList.remove('is-playing');
        document.body.classList.remove('is-leaving');
        setTimeout(() => document.body.classList.remove('page-fade'), 700);
      }

      let _demoteFromPopstate = false;
      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        const data = e.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'play-exited') {
          demoteFromPlay({ updateHistory: !_demoteFromPopstate });
          _demoteFromPopstate = false;
        }
      });

      window.addEventListener('popstate', () => {
        const v = viewFor(location.pathname);
        const isPlaying = document.body.classList.contains('is-playing');
        if (v === 'play' && !isPlaying) {
          document.body.classList.add('page-fade', 'is-leaving');
          setTimeout(() => {
            document.body.classList.add('is-playing');
            setActiveTab('play');
            _enterPlayWhenReady();
          }, 850);
          return;
        }
        if (v !== 'play' && isPlaying) {
          _demoteFromPopstate = true;
          if (bgFrameForPromote && bgFrameForPromote.contentWindow) {
            try { bgFrameForPromote.contentWindow.postMessage({ type: 'exit-play' }, location.origin); } catch (err) { }
          }
          return;
        }
        if (!v || v === 'play') { location.reload(); return; }
        swap(location.pathname + location.search + location.hash);
      });
      window.addEventListener('pageshow', (e) => {
        document.body.classList.remove('is-leaving', 'page-fade');
        const m = document.querySelector('main.page');
        if (m) m.classList.remove('is-entering', 'is-leaving');
        if (e.persisted) document.body.classList.add('tabs-revealed');
      });
    })();
  </script>
</body>

</html>
