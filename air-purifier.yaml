esphome:
  name: air-purifier
  friendly_name: Air Purifier

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Enable OTA updates
ota:
  - platform: esphome

wifi:
  ssid: "The Moores"
  password: !secret wifi_password
  # Use the same BSSID it already connected to
  manual_ip:
    static_ip: 192.168.68.238
    gateway: 192.168.68.1
    subnet: 255.255.255.0

  # Fallback hotspot if WiFi fails
  ap:
    ssid: "Air-Purifier-Fallback"

captive_portal:

# Web server so you can control it from a browser
web_server:
  port: 80
  version: 3

# Onboard RGB LED (nanoESP32-C6 has one WS2812B on GPIO8)
light:
  - platform: esp32_rmt_led_strip
    id: onboard_led
    name: "Onboard LED"
    pin: GPIO8
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 0.5s
    effects:
      - pulse:
          name: "Breathe"
          transition_length: 2s
          update_interval: 2s
      - random:
          name: "Random"
          transition_length: 2s
          update_interval: 3s
