[build]
  command = "npm run vite:build"
  publish = "dist"

[[redirects]]
  from = "/"
  to = "/home.html"
  status = 200
  force = true

[[redirects]]
  from = "/home"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/home/"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/index.html"
  to = "/home.html"
  status = 301
  force = true

[[redirects]]
  from = "/leaderboard"
  to = "/leaderboard.html"
  status = 200

[[redirects]]
  from = "/leaderboard/"
  to = "/leaderboard.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/about/"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/play"
  to = "/vite-index.html"
  status = 200

[[redirects]]
  from = "/play/"
  to = "/vite-index.html"
  status = 200

[[redirects]]
  from = "/old"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/old/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://diy-air-purifier-leaderboard.essays-loges0y.workers.dev/api/:splat"
  status = 200
  force = true

# Never cache HTML so redirect/routing changes take effect immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
